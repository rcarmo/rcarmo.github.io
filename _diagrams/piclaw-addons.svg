    <marker id="ahs" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8z" fill="#3b82f6" stroke="none"/>
    </marker>
  </defs>
  <rect width="1058" height="178" class="bg" rx="8"/>

  <rect x="30" y="30" width="180" height="60" rx="8" class="box-rose"/>
  <text x="120" y="56" text-anchor="middle" class="label">Add-on catalog</text>
  <text x="120" y="74" text-anchor="middle" class="sub">npm packages</text>

  <rect x="270" y="30" width="180" height="60" rx="8" class="box-green"/>
  <text x="360" y="56" text-anchor="middle" class="label">PiClaw runtime</text>
  <text x="360" y="74" text-anchor="middle" class="sub">extension loader</text>

  <rect x="502" y="22" width="294" height="140" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <rect x="559" y="30" width="180" height="60" rx="8" class="box-teal"/>
  <text x="649" y="64" text-anchor="middle" class="label">Active add-ons</text>
  <rect x="518" y="98" width="82" height="48" rx="6" class="box-slate"/>
  <text x="559" y="119" text-anchor="middle" class="label" style="font-size:11px">Proxmox</text>
  <text x="559" y="133" text-anchor="middle" class="sub" style="font-size:9px">VM/LXC mgmt</text>
  <rect x="608" y="98" width="82" height="48" rx="6" class="box-slate"/>
  <text x="649" y="119" text-anchor="middle" class="label" style="font-size:11px">Portainer</text>
  <text x="649" y="133" text-anchor="middle" class="sub" style="font-size:9px">containers</text>
  <rect x="698" y="98" width="82" height="48" rx="6" class="box-indigo"/>
  <text x="739" y="119" text-anchor="middle" class="label" style="font-size:11px">IMAP</text>
  <text x="739" y="133" text-anchor="middle" class="sub" style="font-size:9px">email tools</text>

  <rect x="848" y="30" width="180" height="60" rx="8" class="box-orange"/>
  <text x="938" y="56" text-anchor="middle" class="label">Agent session</text>
  <text x="938" y="74" text-anchor="middle" class="sub">tools · skills · settings</text>

  <path d="M210,60 L270,60" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ahs)"/>
  <path d="M450,60 L559,60" fill="none" stroke="#5070a0" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ah)"/>
  <path d="M739,60 L848,60" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ahs)"/>

  <text x="529" y="174" text-anchor="middle" class="sub">Drop-in npm add-ons for PiClaw — tools, workflows, settings UI</text>
</svg>