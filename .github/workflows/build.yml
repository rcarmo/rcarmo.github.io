name: Build portfolio site
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so push doesn't fail on shallow clone

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install rsvg-convert
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq librsvg2-bin

      - name: Build site
        run: bun run build.ts

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html projects/ assets/og/ assets/fonts/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "Rebuild site [skip ci]"
          # Pull any remote changes with merge (never rebase) before pushing
          git pull --no-rebase --no-edit origin master || true
          git push origin HEAD:master
