<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="haiku-arm64-build">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f9ff"/>
      <stop offset="100%" stop-color="#eaf1fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#8aa3c4" flood-opacity="0.20"/>
    </filter>
    <clipPath id="logoClip">
      <rect x="120" y="153" width="170" height="170" rx="36"/>
    </clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1110" cy="92" r="220" fill="#dbeafe" opacity="0.7"/>
  <circle cx="102" cy="578" r="190" fill="#eff6ff" opacity="0.85"/>
  <g filter="url(#shadow)">
    <rect x="66" y="66" width="1068" height="498" rx="34" fill="#ffffff"/>
    <rect x="66" y="66" width="1068" height="498" rx="34" fill="none" stroke="#d7e3f4"/>
    <rect x="66" y="66" width="1068" height="14" rx="14" fill="url(#accent)"/>
    <rect x="120" y="153" width="170" height="170" rx="36" fill="#eff6ff" stroke="#dbe5f1"/>
    <image href="data:image/png;base64," x="136" y="169" width="138" height="138" preserveAspectRatio="xMidYMid meet" clip-path="url(#logoClip)"/>
    <text x="344" y="178" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700" letter-spacing="1.5" fill="#d97706">HARDWARE</text>
    <text x="344" y="258" font-family="IBM Plex Sans,Inter,system-ui,sans-serif" font-size="58" font-weight="700" fill="#0f172a">haiku-arm64-build</text>
    <text x="344" y="330" font-family="Inter,system-ui,sans-serif" font-size="28" fill="#334155">Build environment and automation for</text>
    <text x="344" y="368" font-family="Inter,system-ui,sans-serif" font-size="28" fill="#334155">compiling Haiku OS on ARM64.</text>
    <rect x="344" y="468" width="212" height="48" rx="24" fill="#eff6ff" stroke="#dbeafe"/>
    <text x="450" y="500" text-anchor="middle" font-family="JetBrains Mono,ui-monospace,monospace" font-size="20" fill="#1e3a8a">rcarmo/haiku-arm64-build</text>
    <text x="1046" y="508" text-anchor="end" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="600" fill="#64748b">rcarmo.github.io</text>
  </g>
</svg>