  <text x="664" y="465" text-anchor="middle" font-size="8" fill="#a78bfa">GEBP NEON</text>
  <text x="664" y="476" text-anchor="middle" font-size="7" fill="#666">arm64</text>

  <rect x="710" y="220" width="58" height="230" rx="3" fill="url(#g3)" opacity="0.7"/>
  <text x="739" y="214" text-anchor="middle" font-size="9" font-weight="bold" fill="#22d3ee">14</text>
  <text x="739" y="465" text-anchor="middle" font-size="8" fill="#22d3ee">OpenBLAS</text>
  <text x="739" y="476" text-anchor="middle" font-size="7" fill="#666">arm64</text>

  <rect x="785" y="118" width="58" height="332" rx="3" fill="url(#g1)" opacity="0.35"/>
  <text x="814" y="112" text-anchor="middle" font-size="9" fill="#fb923c">104</text>
  <text x="814" y="465" text-anchor="middle" font-size="8" fill="#fb923c">gonum</text>
  <text x="814" y="476" text-anchor="middle" font-size="7" fill="#666">arm64 base</text>

