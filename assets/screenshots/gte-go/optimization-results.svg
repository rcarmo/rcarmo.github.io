<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
  </defs>

  <rect width="900" height="560" rx="12" fill="#1a1a2e"/>

  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0e0">GTE-Go: flat-latency embeddings — 12 allocs, zero GC pressure</text>

  <!-- Summary cards -->
  <rect x="20" y="44" width="128" height="46" rx="8" fill="#16213e"/>
  <text x="84" y="60" text-anchor="middle" font-size="9" fill="#888">ALLOCS/EMBED</text>
  <text x="84" y="78" text-anchor="middle" font-size="17" font-weight="bold" fill="#4ade80">12</text>

  <rect x="160" y="44" width="128" height="46" rx="8" fill="#16213e"/>
  <text x="224" y="60" text-anchor="middle" font-size="9" fill="#888">GC PRESSURE</text>
  <text x="224" y="78" text-anchor="middle" font-size="17" font-weight="bold" fill="#4ade80">18 KB/s</text>

  <rect x="300" y="44" width="128" height="46" rx="8" fill="#16213e"/>
  <text x="364" y="60" text-anchor="middle" font-size="9" fill="#888">GOROUTINE CHURN</text>
  <text x="364" y="78" text-anchor="middle" font-size="17" font-weight="bold" fill="#4ade80">0</text>

  <rect x="440" y="44" width="128" height="46" rx="8" fill="#16213e"/>
  <text x="504" y="60" text-anchor="middle" font-size="9" fill="#888">AMD64 (GATHER)</text>
  <text x="504" y="78" text-anchor="middle" font-size="17" font-weight="bold" fill="#a78bfa">10 ms</text>

  <rect x="580" y="44" width="128" height="46" rx="8" fill="#16213e"/>
  <text x="644" y="60" text-anchor="middle" font-size="9" fill="#888">ARM64 (NEON)</text>
  <text x="644" y="78" text-anchor="middle" font-size="17" font-weight="bold" fill="#a78bfa">20 ms</text>

  <rect x="720" y="44" width="160" height="46" rx="8" fill="#16213e"/>
  <text x="800" y="60" text-anchor="middle" font-size="9" fill="#888">vs GONUM GC CHURN</text>
  <text x="800" y="78" text-anchor="middle" font-size="17" font-weight="bold" fill="#fb923c">750× less</text>

  <!-- Chart -->
  <line x1="80" y1="110" x2="80" y2="450" stroke="#444"/>
  <text x="40" y="120" font-size="9" fill="#fb923c" text-anchor="middle">70</text>
