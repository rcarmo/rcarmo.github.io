  <rect x="485" y="256" width="58" height="194" rx="3" fill="url(#g4)" opacity="0.9"/>
  <text x="514" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#a78bfa">10</text>
  <text x="514" y="465" text-anchor="middle" font-size="8" fill="#a78bfa">Gather</text>
  <text x="514" y="476" text-anchor="middle" font-size="7" fill="#666">amd64</text>

  <rect x="555" y="318" width="58" height="132" rx="3" fill="url(#g3)" opacity="0.95"/>
  <text x="584" y="312" text-anchor="middle" font-size="9" font-weight="bold" fill="#22d3ee">5.5</text>
  <text x="584" y="465" text-anchor="middle" font-size="8" fill="#22d3ee">OpenBLAS</text>
  <text x="584" y="476" text-anchor="middle" font-size="7" fill="#666">amd64</text>

  <rect x="635" y="195" width="58" height="255" rx="3" fill="url(#g4)" opacity="0.8"/>
