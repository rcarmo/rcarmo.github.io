  <text x="345" y="530" font-size="8" fill="#ccc">OpenBLAS CGo (opt-in)</text>

  <text x="450" y="550" text-anchor="middle" font-size="7" fill="#555">amd64: i7-12700 4.7GHz · arm64: CIX P1 CD8160 2GHz · Go 1.26.2 · GTE-small (384d, 12L) · 12 allocs, 187B/embed</text>
