  <text x="550" y="500" text-anchor="middle" font-size="7" fill="#777">amd64</text>
  <line x1="625" y1="488" x2="850" y2="488" stroke="#555"/>
  <text x="737" y="500" text-anchor="middle" font-size="7" fill="#777">arm64</text>

