  <rect x="251" y="280" width="42" height="170" rx="3" fill="url(#g2)" opacity="0.8"/>
  <text x="272" y="274" text-anchor="middle" font-size="8" fill="#4ade80">7.3</text>
  <rect x="303" y="292" width="42" height="158" rx="3" fill="url(#g2)" opacity="0.7"/>
  <text x="324" y="286" text-anchor="middle" font-size="8" fill="#34d399">6.6</text>
  <rect x="355" y="298" width="42" height="152" rx="3" fill="url(#g2)" opacity="0.65"/>
  <text x="376" y="292" text-anchor="middle" font-size="8" fill="#34d399">6.3</text>
  <rect x="407" y="318" width="42" height="132" rx="3" fill="url(#g3)" opacity="0.9"/>
  <text x="428" y="312" text-anchor="middle" font-size="9" font-weight="bold" fill="#22d3ee">5.5</text>

  <line x1="465" y1="110" x2="465" y2="460" stroke="#444" stroke-dasharray="2,4"/>

