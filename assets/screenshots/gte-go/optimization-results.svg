  <text x="220" y="465" text-anchor="middle" font-size="7" fill="#aaa">P1b</text>
  <text x="272" y="465" text-anchor="middle" font-size="7" fill="#aaa">P1c</text>
  <text x="324" y="465" text-anchor="middle" font-size="7" fill="#aaa">P2a</text>
  <text x="376" y="465" text-anchor="middle" font-size="7" fill="#aaa">P2b</text>
