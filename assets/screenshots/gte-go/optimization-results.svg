  <rect x="95" y="118" width="42" height="332" rx="3" fill="url(#g1)" opacity="0.9"/>
  <text x="116" y="112" text-anchor="middle" font-size="9" font-weight="bold" fill="#fb923c">67.4</text>
  <rect x="147" y="126" width="42" height="324" rx="3" fill="url(#g1)" opacity="0.7"/>
  <text x="168" y="120" text-anchor="middle" font-size="8" fill="#f59e0b">63.4</text>
