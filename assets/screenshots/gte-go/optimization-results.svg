  <circle cx="220" cy="189" r="4" fill="#60a5fa"/>
  <circle cx="428" cy="162" r="4" fill="#60a5fa"/>
  <text x="116" y="422" text-anchor="middle" font-size="7" fill="#60a5fa">1.0×</text>
  <text x="220" y="181" text-anchor="middle" font-size="7" font-weight="bold" fill="#60a5fa">9.1×</text>
  <text x="428" y="154" text-anchor="middle" font-size="7" font-weight="bold" fill="#60a5fa">12.3×</text>

