<svg xmlns="http://www.w3.org/2000/svg" width="1030" height="242" viewBox="0 0 1030 242">
<style>
:root{color-scheme:light dark;--bg:#f8f9fc;--text:#1a1f36;--muted:#6b7394;--win:#dcfce7;--ok:#fef9c3;--slow:#fee2e2;--best:#16a34a;--border:#e5e7eb}
