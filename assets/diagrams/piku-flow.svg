<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1e24; }
      .box { fill: #21262d; stroke: #30363d; }
      .box-accent { fill: #0d2340; stroke: #2b6cb0; }
      .box-green { fill: #0d2a1f; stroke: #2a7a3a; }
      .box-warm { fill: #2a1e18; stroke: #c87020; }
      .label { fill: #e8d8d0; }
      .sublabel { fill: #705848; }
      .arrow { stroke: #705848; }
      .arrow-accent { stroke: #2b6cb0; }
      .line { stroke: #30363d; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f0f4fa; }
      .box { fill: #ffffff; stroke: #d0d7de; }
      .box-accent { fill: #dbeafe; stroke: #3b82f6; }
      .box-green { fill: #d1fae5; stroke: #059669; }
      .box-warm { fill: #fef3c7; stroke: #d97706; }
      .label { fill: #1a2a40; }
      .sublabel { fill: #4a6480; }
      .arrow { stroke: #90a8c0; }
      .arrow-accent { stroke: #3b82f6; }
      .line { stroke: #d0d7de; }
    }
    text { font-family: -apple-system, "Segoe UI", Helvetica, sans-serif; }
    .label { font-size: 13px; font-weight: 600; }
    .sublabel { font-size: 11px; }
    .arrow { stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-accent { stroke-width: 1.5; fill: none; marker-end: url(#arr-accent); }
    .line { stroke-width: 1; fill: none; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" class="arrow" style="fill:currentColor;stroke:none"/>
    </marker>
    <marker id="arr-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" class="arrow-accent" style="fill:currentColor;stroke:none"/>
    </marker>
  </defs>
  <rect width="520" height="140" class="bg" rx="8"/>
  
  <rect x="20" y="40" width="100" height="50" rx="6" class="box-accent" stroke-width="1.5"/>
    <text x="70" y="61" text-anchor="middle" class="label">git push</text>
    <text x="70" y="74" text-anchor="middle" class="sublabel">your machine</text>
  <line x1="120" y1="65" x2="160" y2="65" class="arrow-accent"/>
  <rect x="160" y="40" width="100" height="50" rx="6" class="box-green" stroke-width="1.5"/>
    <text x="210" y="61" text-anchor="middle" class="label">piku hook</text>
    <text x="210" y="74" text-anchor="middle" class="sublabel">your server</text>
  <line x1="260" y1="65" x2="300" y2="65" class="arrow"/>
  <rect x="300" y="20" width="90" height="40" rx="6" class="box" stroke-width="1.5"/>
    <text x="345" y="36" text-anchor="middle" class="label">install deps</text>
    <text x="345" y="49" text-anchor="middle" class="sublabel">auto</text>
  <rect x="300" y="70" width="90" height="40" rx="6" class="box" stroke-width="1.5"/>
    <text x="345" y="86" text-anchor="middle" class="label">start workers</text>
    <text x="345" y="99" text-anchor="middle" class="sublabel">uwsgi</text>
  <line x1="390" y1="65" x2="420" y2="65" class="arrow"/>
  <rect x="420" y="40" width="80" height="50" rx="6" class="box-green" stroke-width="1.5"/>
    <text x="460" y="61" text-anchor="middle" class="label">live</text>
    <text x="460" y="74" text-anchor="middle" class="sublabel">nginx + TLS</text>

</svg>