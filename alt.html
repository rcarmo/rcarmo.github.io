<script>
// ── Cluster data — loaded from alt-clusters.json ────────────────────────────
let CLUSTERS, PATH_GRAPH, PATH_EDGES;

// ── Replace logo lookup: now uses URL path from JSON ────────────────────────
function logoSrc(projId) {
  for (const cl of Object.values(CLUSTERS||{})) {
    if (cl.projects.some(p => p.id === projId)) return cl.logo || null;
  }
  return null;
}

// ── Camera views ─────────────────────────────────────────────────────────────
const CAM_VIEWS = { overview: {target:[0,3,0], alpha:-Math.PI/2, beta:Math.PI*0.335, radius:95} };


// ── Babylon engine & scene ───────────────────────────────────────────────────
const canvas = document.getElementById('cv');
const engine = new BABYLON.Engine(canvas, true, {stencil:true, preserveDrawingBuffer:false});
const scene  = new BABYLON.Scene(engine);
scene.clearColor   = new BABYLON.Color4(0.006, 0.010, 0.018, 1.0);
scene.ambientColor = new BABYLON.Color3(0.06, 0.08, 0.12);

// Camera
const camera = new BABYLON.ArcRotateCamera('cam', -Math.PI/2, Math.PI/3.4, 68, new BABYLON.Vector3(0,0,8), scene);
camera.lowerRadiusLimit=4; camera.upperRadiusLimit=140;
camera.lowerBetaLimit=0.08; camera.upperBetaLimit=Math.PI*0.46;
camera.wheelPrecision=10; camera.attachControl(canvas, true);
camera.fov = 1.1; // wider FOV to see all 9 clusters

// Lighting
const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.4,-0.8,-0.3), scene);
sun.intensity = 3.2;
sun.diffuse   = new BABYLON.Color3(0.85, 0.90, 1.0);

const fill = new BABYLON.HemisphericLight('fill', new BABYLON.Vector3(0,1,0), scene);
fill.intensity   = 0.25;
fill.diffuse     = new BABYLON.Color3(0.5, 0.6, 0.8);
fill.groundColor = new BABYLON.Color3(0.02, 0.03, 0.06);
fill.groundColor = new BABYLON.Color3(0.01, 0.02, 0.06);

// Rim light from above-behind (blue-white sky fill)
const rim = new BABYLON.DirectionalLight('rim', new BABYLON.Vector3(0.3, -0.4, 0.8), scene);
rim.intensity = 0.4;
rim.diffuse   = new BABYLON.Color3(0.6, 0.75, 0.95);
const shadowGen = new BABYLON.ShadowGenerator(1024, sun);
shadowGen.usePoissonSampling = true;
shadowGen.bias = 0.002;

// ── Material factory ─────────────────────────────────────────────────────────
function hex3(h){const n=parseInt(h.replace('#',''),16);return new BABYLON.Color3((n>>16&255)/255,(n>>8&255)/255,(n&255)/255);}
function mat(name,hexCol,opts={}){
  const m=new BABYLON.StandardMaterial(name,scene);
  const c=hex3(hexCol);
  m.diffuseColor  = c.scale(opts.diff ?? 0.75);
  m.specularColor = c.scale(opts.spec ?? 0.8);
  m.emissiveColor = c.scale(opts.emis ?? 0.05);
  m.specularPower = opts.power ?? 48;
  return m;
}
function darkMat(name,hexCol){return mat(name,hexCol,{diff:0.25,spec:0.08,emis:0.02,power:8});}
function glowMat(name,hexCol,str){return mat(name,hexCol,{diff:0.3,spec:0.1,emis:str??0.28,power:4});}


// ── Ground ───────────────────────────────────────────────────────────────────
const ground = BABYLON.MeshBuilder.CreateGround('ground',{width:240,height:240,subdivisions:1},scene);
const gm = new BABYLON.StandardMaterial('gmat',scene);
gm.diffuseColor  = new BABYLON.Color3(0.004,0.006,0.010);
gm.specularColor = new BABYLON.Color3(0.04,0.07,0.16);
gm.specularPower = 120;
ground.material  = gm;
ground.receiveShadows = false;

// ── Shape builders ───────────────────────────────────────────────────────────

// NEEDLE — piclaw/highlight: diamond spire with orbit rings
function buildNeedle(pos,col){
  const cx=pos[0],cz=pos[2];
  const m1=glowMat('nm1',col,0.18), m2=glowMat('nm2',col,0.08);

  // Central spire
  const spire=BABYLON.MeshBuilder.CreateCylinder('ns',{height:9,diameterTop:0.05,diameterBottom:0.8,tessellation:8},scene);
  spire.position.set(cx,4.5,cz); spire.material=m1;
  shadowGen.addShadowCaster(spire);

  // Diamond cap
  const cap=BABYLON.MeshBuilder.CreatePolyhedron('nc',{type:1,size:1.1},scene);
  cap.position.set(cx,10,cz); cap.material=glowMat('ncap',col,0.35);
  cap.renderOutline=true; cap.outlineColor=hex3(col).scale(0.5); cap.outlineWidth=0.05;
  shadowGen.addShadowCaster(cap);

  // Three orbit rings at intervals
  [3.0,5.5,8.0].forEach((y,i)=>{
    const r=BABYLON.MeshBuilder.CreateTorus('nr'+i,{diameter:2.8+i*0.8,thickness:0.08,tessellation:36},scene);
    r.position.set(cx,y,cz);
    r.rotation.x=Math.PI/2+0.3*Math.sin(i); r.rotation.z=0.2*i;
    r.material=glowMat('nrm'+i,col,0.18);
    shadowGen.addShadowCaster(r);
  });

  // Base hex platform
  const base=BABYLON.MeshBuilder.CreateCylinder('nb',{height:0.5,diameter:7,tessellation:6},scene);
  base.position.set(cx,0.25,cz); base.material=darkMat('nbm',col); base.rotation.y=Math.PI/6;
  base.receiveShadows=true; shadowGen.addShadowCaster(base);
  return cap; // for animation
}

// COLUMN — piku: classical tapered column with capital
function buildColumn(pos,col){
  const cx=pos[0],cz=pos[2];
  const shafts=[
    {h:6.0,dTop:0.85,dBot:1.0,y:3.0},
    {h:0.6,dTop:1.4, dBot:0.9,y:6.3},  // capital
    {h:0.35,dTop:1.6,dBot:1.4,y:6.78}, // abacus
    {h:0.4,dTop:0.8,dBot:1.0,y:0.2},   // base
  ];
  shafts.forEach((s,i)=>{
    const c=BABYLON.MeshBuilder.CreateCylinder('sft'+i,{height:s.h,diameterTop:s.dTop,diameterBottom:s.dBot,tessellation:12},scene);
    c.position.set(cx,s.y,cz);
    c.material=(i===1||i===2)?glowMat('colm'+i,col,0.12):darkMat('colm'+i,col);
    shadowGen.addShadowCaster(c); c.receiveShadows=true;
  });
  // Stepped base
  [0.3,0.5,0.7].forEach((scale,i)=>{
    const st=BABYLON.MeshBuilder.CreateCylinder('stb'+i,{height:0.25,diameter:3.5-i*0.5,tessellation:6},scene);
    st.position.set(cx,-0.25+i*0.25,cz); st.material=darkMat('stbm',col);
    st.receiveShadows=true;
  });
}

// NEURAL — ai-agents: sphere cluster with connecting rods
function buildNeural(pos,col){
  const cx=pos[0],cz=pos[2];
  const spherePositions=[];
  // Central brain sphere
  const brain=BABYLON.MeshBuilder.CreateSphere('brain',{diameter:2.2,segments:8},scene);
  brain.position.set(cx,2,cz); brain.material=glowMat('brm',col,0.15);
  brain.renderOutline=true; brain.outlineColor=hex3(col).scale(0.4); brain.outlineWidth=0.04;
  shadowGen.addShadowCaster(brain);
  spherePositions.push(brain.position.clone());

  // Satellite nodes
  const nodeData=[
    [2.8, 0.3, 2.2],[-2.6, 0.4,-2.0],[2.4, 0.6,-2.5],[-2.2, 0.3, 2.8],
    [1.5, 2.0, 1.6],[-1.8, 2.2,-1.7],[0, 2.8, 2.6],[-0.5,1.8,-2.8],
  ];
  const sm=glowMat('sm',col,0.10);
  nodeData.forEach(([dx,dy,dz],i)=>{
    const r=0.45+Math.random()*0.35;
    const node=BABYLON.MeshBuilder.CreateSphere('node'+i,{diameter:r*2,segments:6},scene);
    node.position.set(cx+dx,1.2+dy,cz+dz); node.material=sm;
    shadowGen.addShadowCaster(node);
    spherePositions.push(node.position.clone());
    // Connecting rod
    const start=new BABYLON.Vector3(cx,2,cz), end=node.position;
    const dir=end.subtract(start), len=dir.length();
    const rod=BABYLON.MeshBuilder.CreateCylinder('rod'+i,{height:len,diameter:0.06,tessellation:4},scene);
    rod.position.set((start.x+end.x)/2,(start.y+end.y)/2,(start.z+end.z)/2);
    const axis=BABYLON.Vector3.Up().cross(dir.normalize());
    if(axis.length()>0.001){const ang=Math.acos(BABYLON.Vector3.Up().dot(dir.normalize()));rod.rotationQuaternion=BABYLON.Quaternion.RotationAxis(axis.normalize(),ang);}
    rod.material=mat('rodm',col,{diff:0.1,spec:0.05,emis:0.06,power:4});
  });

  // Flat circular base
  const base=BABYLON.MeshBuilder.CreateCylinder('nb',{height:0.35,diameter:9,tessellation:32},scene);
  base.position.set(cx,0.17,cz); base.material=darkMat('nbm',col);
  base.receiveShadows=true;
  return brain; // for animation
}

// SKYLINE — terminal: array of columns at varying heights (CRT/console aesthetic)
function buildSkyline(pos,col){
  const cx=pos[0],cz=pos[2];
  const heights=[5.5,3.2,7.0,4.5,6.2,2.8,5.0,3.8,6.5,4.0,7.2,3.5,5.8,4.2,6.0];
  const rows=3,cols=5, spacing=2.1;
  const startX=cx-(cols-1)*spacing/2, startZ=cz-(rows-1)*spacing/2;
  heights.forEach((h,i)=>{
    const row=Math.floor(i/cols), col2=i%cols;
    const x=startX+col2*spacing, z=startZ+row*spacing;
    const bk=BABYLON.MeshBuilder.CreateBox('sk'+i,{width:1.4,height:h,depth:1.4},scene);
    bk.position.set(x,h/2,z);
    const bright=h/7.5;
    bk.material=mat('skm'+i,col,{diff:0.2+bright*0.15,spec:0.3,emis:bright*0.14,power:12});
    bk.renderOutline=true; bk.outlineColor=hex3(col).scale(0.25); bk.outlineWidth=0.03;
    shadowGen.addShadowCaster(bk); bk.receiveShadows=true;
    // Antenna on tall ones
    if(h>6){
      const ant=BABYLON.MeshBuilder.CreateCylinder('ant'+i,{height:1.4,diameterTop:0.02,diameterBottom:0.08,tessellation:4},scene);
      ant.position.set(x,h+0.7,z); ant.material=glowMat('antm',col,0.3);
    }
  });
  // Raised platform
  const base=BABYLON.MeshBuilder.CreateBox('skbase',{width:11.5,height:0.4,depth:7.5},scene);
  base.position.set(cx,0.2,cz); base.material=darkMat('sbbm',col);
  base.receiveShadows=true;
}

// PAVILION — macOS: stacked smooth discs, ascending scale
function buildPavilion(pos,col){
  const cx=pos[0],cz=pos[2];
  const tiers=[
    {y:0.3, d:8.5, h:0.55},
    {y:0.9, d:7.0, h:0.55},
    {y:1.5, d:5.5, h:0.6},
    {y:2.15,d:4.0, h:0.7},
    {y:2.95,d:2.8, h:0.9},
    {y:3.95,d:1.5, h:1.2},
    {y:5.3, d:0.7, h:1.8},  // spire
  ];
  tiers.forEach((t,i)=>{
    const d=BABYLON.MeshBuilder.CreateCylinder('pav'+i,{height:t.h,diameter:t.d,tessellation:32},scene);
    d.position.set(cx,t.y,cz);
    const frac=i/tiers.length;
    d.material=mat('pavm'+i,col,{diff:0.45+frac*0.2,spec:0.9-frac*0.3,emis:frac*0.18,power:80-frac*40});
    shadowGen.addShadowCaster(d); d.receiveShadows=true;
  });
}

// RACK — infrastructure: neat grid of server-rack boxes
function buildRack(pos,col){
  const cx=pos[0],cz=pos[2];
  const rackLayout=[
    {w:4.5,h:1.4,d:1.8,x:0,   z:-2.5,y:0.7},
    {w:4.5,h:1.4,d:1.8,x:0,   z: 0,  y:0.7},
    {w:4.5,h:1.4,d:1.8,x:0,   z: 2.5,y:0.7},
    {w:2.0,h:3.5,d:2.0,x:-3.0,z:-1.8,y:1.75},
    {w:2.0,h:3.5,d:2.0,x: 3.0,z: 1.8,y:1.75},
    {w:4.5,h:0.3,d:1.8,x:0,   z:-2.5,y:1.55},
    {w:4.5,h:0.3,d:1.8,x:0,   z: 0,  y:1.55},
    {w:4.5,h:0.3,d:1.8,x:0,   z: 2.5,y:1.55},
  ];
  rackLayout.forEach((r,i)=>{
    const bk=BABYLON.MeshBuilder.CreateBox('rack'+i,{width:r.w,height:r.h,depth:r.d},scene);
    bk.position.set(cx+r.x,r.y,cz+r.z);
    bk.material=mat('rkm'+i,col,{diff:0.25,spec:0.5,emis:i<3?0.05:0.12,power:30});
    bk.renderOutline=true; bk.outlineColor=hex3(col).scale(0.2); bk.outlineWidth=0.025;
    shadowGen.addShadowCaster(bk); bk.receiveShadows=true;
    // LED strip on rack fronts
    if(i<3){
      const led=BABYLON.MeshBuilder.CreateBox('led'+i,{width:r.w*0.9,height:0.06,depth:0.05},scene);
      led.position.set(cx+r.x,r.y+r.h*0.45,cz+r.z-r.d/2-0.03);
      led.material=glowMat('ledm',col,0.5);
    }
  });
  // Raised floor
  const floor2=BABYLON.MeshBuilder.CreateBox('rackfloor',{width:10,height:0.35,depth:8},scene);
  floor2.position.set(cx,0.17,cz); floor2.material=darkMat('rfm',col);
  floor2.receiveShadows=true;
}

// ── Billboard factory ─────────────────────────────────────────────────────────
const billboards=[];
function makeBillboard(x,z,proj,accentHex,logoImg){
  const W=600,H=280; const cv2=document.createElement('canvas');
  cv2.width=W; cv2.height=H;
  const ctx=cv2.getContext('2d');
  const n=parseInt(accentHex.replace('#',''),16);
  const r=n>>16&255,g=n>>8&255,b=n&255;

  // Dark base
  ctx.fillStyle='#020810'; ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(40,70,140,0.15)'; ctx.lineWidth=0.5;
  for(let i=0;i<=W;i+=20){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for(let j=0;j<=H;j+=20){ctx.beginPath();ctx.moveTo(0,j);ctx.lineTo(W,j);ctx.stroke();}

  // Accent left bar
  ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(0,0,4,H);

  // Accent top-right corner bracket
  ctx.strokeStyle=`rgba(${r},${g},${b},0.7)`; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(W-28,2); ctx.lineTo(W-2,2); ctx.lineTo(W-2,28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,H-28); ctx.lineTo(2,H-2); ctx.lineTo(28,H-2); ctx.stroke();

  // Logo
  const hasLogo=logoImg&&logoImg.complete&&logoImg.naturalWidth>0;
  let tx=18;
  if(hasLogo){
    const ls=64;
    try{ctx.drawImage(logoImg,14,(H-ls)/2,ls,ls);}catch(e){}
    tx=14+ls+12;
  }

  // Name
  ctx.fillStyle='#d8e8ff'; ctx.font='bold 40px ui-monospace,"SF Mono",monospace';
  ctx.fillText(proj.name.length>13?proj.name.slice(0,12)+'…':proj.name, tx, 52);

  // Stars + lang
  ctx.fillStyle=`rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+60)},1)`;
  ctx.font='bold 22px ui-monospace,monospace';
  ctx.fillText(`★ ${proj.stars.toLocaleString()}   ${proj.lang}`, tx, 84);

  // Separator
  ctx.strokeStyle=`rgba(${r},${g},${b},0.25)`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(tx,100); ctx.lineTo(W-18,100); ctx.stroke();

  // Description
  ctx.fillStyle='rgba(120,160,220,0.88)'; ctx.font='19px system-ui,sans-serif';
  const words=proj.desc.split(' '), maxW=W-tx-18;
  let line='',y=126;
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,tx,y);y+=26;line=w;if(y>H-32)break;}else line=t;}
  if(line&&y<=H-32)ctx.fillText(line,tx,y);

  // Click hint
  ctx.fillStyle=`rgba(${r},${g},${b},0.65)`; ctx.font='bold 15px ui-monospace,monospace';
  ctx.textAlign='right'; ctx.fillText('→ open',W-12,H-12); ctx.textAlign='left';

  const tex=new BABYLON.DynamicTexture('bbtex',{width:W,height:H},scene,false);
  tex.getContext().drawImage(cv2,0,0); tex.update();
  const bm=new BABYLON.StandardMaterial('bbmat',scene);
  bm.emissiveTexture=tex; bm.diffuseTexture=tex;
  bm.specularColor=BABYLON.Color3.Black(); bm.backFaceCulling=false;

  // Thin post
  const post=BABYLON.MeshBuilder.CreateBox('post',{width:0.1,height:3.2,depth:0.1},scene);
  post.material=darkMat('pm',accentHex); post.position.set(x,1.6,z);
  shadowGen.addShadowCaster(post);

  // Panel
  const panel=BABYLON.MeshBuilder.CreatePlane('panel',{width:5.0,height:2.28},scene);
  panel.material=bm;
  panel.position.set(x,2.9,z);
  panel.billboardMode=BABYLON.Mesh.BILLBOARDMODE_Y;
  panel.metadata={proj,x,z};
  billboards.push(panel);
}

// ── Path connections (thin glowing lines) ────────────────────────────────────
const PATH_CURVES={};
function makePath(edgeKey,ax,az,bx,bz,trimA,trimB){
  const dx=bx-ax,dz=bz-az,len=Math.hypot(dx,dz);
  if(len<trimA+trimB+1)return;
  const u=dx/len,v=dz/len;
  const sx=ax+u*trimA,sz=az+v*trimA,ex=bx-u*trimB,ez=bz-v*trimB;
  const perpX=-v,perpZ=u,sway=(Math.random()-0.5)*len*0.05;
  const mx=(sx+ex)*0.5+perpX*sway,mz=(sz+ez)*0.5+perpZ*sway;
  const N=20,pts=[];
  for(let i=0;i<=N;i++){const t=i/N,mt=1-t;pts.push([mt*mt*sx+2*mt*t*mx+t*t*ex,mt*mt*sz+2*mt*t*mz+t*t*ez]);}
  const hw=0.18,left=[],right=[];
  for(let i=0;i<pts.length;i++){
    const p=pts[i],ip=Math.max(0,i-1),inp=Math.min(pts.length-1,i+1);
    const tx2=pts[inp][0]-pts[ip][0],tz2=pts[inp][1]-pts[ip][1];
    const tl=Math.hypot(tx2,tz2)||1,nx=-tz2/tl,nz2=tx2/tl;
    left.push(new BABYLON.Vector3(p[0]+nx*hw,0.04,p[1]+nz2*hw));
    right.push(new BABYLON.Vector3(p[0]-nx*hw,0.04,p[1]-nz2*hw));
  }
  const ribbon=BABYLON.MeshBuilder.CreateRibbon('path',{pathArray:[left,right],sideOrientation:BABYLON.Mesh.DOUBLESIDE},scene);
  const pm=new BABYLON.StandardMaterial('pmat',scene);
  pm.emissiveColor=new BABYLON.Color3(0.025,0.04,0.10);
  pm.diffuseColor=new BABYLON.Color3(0.008,0.015,0.04);
  pm.alpha=0.55;
  pm.specularColor=BABYLON.Color3.Black();
  ribbon.material=pm; ribbon.receiveShadows=true;
  if(edgeKey)PATH_CURVES[edgeKey]=pts;
}


// LATTICE — ML & Models: 3D grid of data nodes
function buildLattice(pos,col){
  const cx=pos[0],cz=pos[2];
  const gm=mat('lm',col,{diff:0.4,spec:0.7,emis:0.12,power:32});
  const em=mat('lem',col,{diff:0.15,spec:0.1,emis:0.06,power:8});
  const grid=3,sp=2.0,nodes=[];
  for(let x=0;x<grid;x++) for(let y=0;y<grid;y++) for(let z=0;z<grid;z++){
    const nx=cx+(x-(grid-1)/2)*sp,ny=0.8+y*sp,nz=cz+(z-(grid-1)/2)*sp;
    const n=BABYLON.MeshBuilder.CreatePolyhedron('ln',{type:3,size:0.28},scene);
    n.position.set(nx,ny,nz); n.material=gm;
    n.renderOutline=true; n.outlineColor=hex3(col).scale(0.4); n.outlineWidth=0.03;
    shadowGen.addShadowCaster(n); nodes.push({x:nx,y:ny,z:nz});
  }
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    const d=Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);
    if(d>sp*1.05) continue;
    const rod=BABYLON.MeshBuilder.CreateCylinder('lr',{height:d,diameter:0.06,tessellation:4},scene);
    rod.position.set((a.x+b.x)/2,(a.y+b.y)/2,(a.z+b.z)/2);
    const dir=new BABYLON.Vector3(b.x-a.x,b.y-a.y,b.z-a.z).normalize();
    const ax2=BABYLON.Vector3.Up().cross(dir);
    if(ax2.length()>0.001){const ang=Math.acos(Math.min(1,BABYLON.Vector3.Up().dot(dir)));rod.rotationQuaternion=BABYLON.Quaternion.RotationAxis(ax2.normalize(),ang);}
    rod.material=em;
  }
  const base=BABYLON.MeshBuilder.CreateCylinder('lb',{height:0.4,diameter:9,tessellation:6},scene);
  base.position.set(cx,0.2,cz); base.material=darkMat('lbm',col); base.rotation.y=Math.PI/6; base.receiveShadows=true;
}

// PCB — Hardware: circuit board with components
function buildPcb(pos,col){
  const cx=pos[0],cz=pos[2];
  const board=BABYLON.MeshBuilder.CreateBox('pcb',{width:9,height:0.25,depth:7},scene);
  board.position.set(cx,0.125,cz); board.material=mat('pcbm','#1a3a1a',{diff:0.4,spec:0.3,emis:0.02,power:30});
  board.receiveShadows=true; shadowGen.addShadowCaster(board);
  const tm=mat('tm',col,{diff:0.3,spec:0.5,emis:0.08,power:40});
  [[-2,0.26,-1,3,0.06],[1,0.26,2,0.1,2],[2,0.26,-2,2.5,0.08]].forEach(([tx,ty,tz,tw,td],i)=>{
    const tr=BABYLON.MeshBuilder.CreateBox('tr'+i,{width:tw,height:0.04,depth:td},scene);
    tr.position.set(cx+tx,ty,cz+tz); tr.material=tm;
  });
  const cm=mat('chipm','#111111',{diff:0.2,spec:0.1,emis:0.03,power:8});
  [[-2.5,0.35,1.5,1.2,0.9],[1.5,0.35,-1,1.4,1.0],[0,0.35,0.5,1.1,1.1],[-1,0.35,-2,1.6,0.8]].forEach(([cx2,cy,cz2,cw,cd],i)=>{
    const chip=BABYLON.MeshBuilder.CreateBox('ch'+i,{width:cw,height:0.22,depth:cd},scene);
    chip.position.set(cx+cx2,cy,cz+cz2); chip.material=cm;
    chip.renderOutline=true; chip.outlineColor=hex3(col).scale(0.3); chip.outlineWidth=0.02;
    shadowGen.addShadowCaster(chip);
  });
  const capm=glowMat('capm',col,0.15);
  [[-3.5,0.5,-2.5],[3,0.5,2],[2.5,0.5,-2.5],[-3,0.5,2.5]].forEach(([cx3,cy,cz3])=>{
    const cap=BABYLON.MeshBuilder.CreateCylinder('cap',{height:0.75,diameter:0.4,tessellation:8},scene);
    cap.position.set(cx+cx3,cy,cz+cz3); cap.material=capm; shadowGen.addShadowCaster(cap);
  });
  const ant=BABYLON.MeshBuilder.CreateCylinder('pa',{height:2.5,diameterTop:0.05,diameterBottom:0.2,tessellation:6},scene);
  ant.position.set(cx+3.5,1.5,cz-2.5); ant.material=glowMat('am2',col,0.25); shadowGen.addShadowCaster(ant);
}

// SHELVES — Libraries: bookshelf unit
function buildShelves(pos,col){
  const cx=pos[0],cz=pos[2];
  const fW=7,fD=1.8,sH=1.4,nShelves=4;
  const fm=darkMat('frm',col);
  [cx-fW/2+0.15,cx,cx+fW/2-0.15].forEach(px=>{
    const u=BABYLON.MeshBuilder.CreateBox('upr',{width:0.25,height:sH*nShelves+0.5,depth:fD},scene);
    u.position.set(px,sH*nShelves/2+0.25,cz); u.material=fm;
    shadowGen.addShadowCaster(u); u.receiveShadows=true;
  });
  for(let i=0;i<=nShelves;i++){
    const sh=BABYLON.MeshBuilder.CreateBox('sh'+i,{width:fW,height:0.12,depth:fD+0.1},scene);
    sh.position.set(cx,i*sH+0.06,cz); sh.material=fm;
    shadowGen.addShadowCaster(sh); sh.receiveShadows=true;
    if(i>0&&i<nShelves){
      let bx=cx-fW/2+0.35;
      while(bx<cx+fW/2-0.4){
        const bw=0.18+Math.random()*0.22,bh=0.8+Math.random()*0.5;
        const book=BABYLON.MeshBuilder.CreateBox('bk',{width:bw,height:bh,depth:fD*0.8},scene);
        book.position.set(bx+bw/2,i*sH+0.06+bh/2,cz);
        const hue=(bx*20)%360;
        const bkm=new BABYLON.StandardMaterial('bkm',scene);
        bkm.diffuseColor=new BABYLON.Color3((150+100*Math.sin(hue*Math.PI/180))/255,(80+80*Math.sin((hue+120)*Math.PI/180))/255,(100+80*Math.sin((hue+240)*Math.PI/180))/255);
        bkm.specularColor=new BABYLON.Color3(0.1,0.1,0.1);
        book.material=bkm; shadowGen.addShadowCaster(book);
        bx+=bw+0.04;
      }
    }
  }
  const base2=BABYLON.MeshBuilder.CreateBox('shb',{width:fW+0.5,height:0.4,depth:fD+0.5},scene);
  base2.position.set(cx,0.2,cz); base2.material=fm; base2.receiveShadows=false;
}

// ── Load cluster data from JSON, then build the scene ────────────────────────
fetch('alt-clusters.json').then(r=>r.json()).then(data=>{
  CLUSTERS   = data.clusters;
  PATH_GRAPH = data.pathGraph;
  PATH_EDGES = [...new Set(
    Object.entries(PATH_GRAPH).flatMap(([a,bs])=>bs.map(b=>[a,b].sort().join('--')))
  )];
  // Apply fixed circular layout from JSON, bowl shape: near clusters raised
  for (const [key, [x, z]] of Object.entries(data.layout)) {
    if (CLUSTERS[key]) {
      // z<0 = near camera; raise by up to 10 units so all appear at similar screen height
      const yOff = key === 'highlight' ? 0 : Math.max(0, -z * 0.22);
      CLUSTERS[key].pos = [x, yOff, z];
    }
  }

  // Per-cluster accent point lights (placed at computed positions)
  Object.entries(CLUSTERS).forEach(([key,cl])=>{
    const [px,,pz]=cl.pos;
    const pl=new BABYLON.PointLight('pl_'+key, new BABYLON.Vector3(px,4,pz),scene);
    pl.diffuse   = hex3(cl.col).scale(1.2);
    pl.intensity = 3.5;
    pl.range     = 45;
    pl.specular  = hex3(cl.col).scale(0.8);
  });

  // Derive per-cluster camera views from positions
  for (const [key, cl] of Object.entries(CLUSTERS)) {
    const x = cl.pos?.[0]??0, z = cl.pos?.[2]??0;
    CAM_VIEWS[key] = {target:[x,3,z], alpha:Math.atan2(x,z)+Math.PI*0.5, beta:Math.PI/3.8, radius:22};
  }


// ── Build scene ───────────────────────────────────────────────────────────────
PATH_EDGES.forEach(e=>{
  const[k,j]=e.split('--');
  const a=CLUSTERS[k].pos,b=CLUSTERS[j].pos;
  const rK=CLUSTERS[k].projects.length<=2?5:9,rJ=CLUSTERS[j].projects.length<=2?5:9;
  const dKJ=Math.hypot(a[0]-b[0],a[2]-b[2]);
  makePath(e,a[0],a[2],b[0],b[2],Math.min(rK+2.5,dKJ*0.35),Math.min(rJ+2.5,dKJ*0.35));
});

const animatables={}; // key → mesh for per-cluster animation

Object.entries(CLUSTERS).forEach(([key,cluster])=>{
  const{pos,col,shape,projects}=cluster;
  let landmark;
  const nBefore = scene.meshes.length;
  switch(shape){
    case'needle':  landmark=buildNeedle(pos,col); break;
    case'column':  buildColumn(pos,col); break;
    case'neural':  landmark=buildNeural(pos,col); break;
    case'skyline': buildSkyline(pos,col); break;
    case'pavilion':buildPavilion(pos,col); break;
    case'rack':    buildRack(pos,col); break;
    case'lattice': buildLattice(pos,col); break;
    case'pcb':     buildPcb(pos,col); break;
    case'shelves': buildShelves(pos,col); break;
  }
  // Bowl lift + scale: raise and enlarge all newly-created meshes
  const yOff = pos[1] ?? 0;
  for(let _i=nBefore;_i<scene.meshes.length;_i++){
    if(yOff > 0.1) scene.meshes[_i].position.y += yOff;
    scene.meshes[_i].scaling.scaleInPlace(1.5);
  }
  if(yOff > 0.1 && landmark) landmark.position.y += yOff;
  if(landmark) animatables[key]=landmark;

  // Billboards
  if(key==='highlight')return;
  const N=projects.length;
  projects.forEach((proj,i)=>{
    const angle=N===1?Math.atan2(pos[2],pos[0])+Math.PI:(i/N)*Math.PI*2;
    const r2=N===1?4.5:Math.min(5*Math.sqrt(N/2),8.5);
    const bx=pos[0]+Math.cos(angle)*r2,bz=pos[2]+Math.sin(angle)*r2;
    const logoUrl=logoSrc(proj.id);
    if(logoUrl){
      const img=new Image();let done=false;
      const cb=(li)=>{if(done)return;done=true;makeBillboard(bx,bz,proj,col,li);};
      img.onload=()=>cb(img);img.onerror=()=>cb(null);img.src=logoUrl;
      if(img.complete)cb(img.naturalWidth>0?img:null);
    }else makeBillboard(bx,bz,proj,col,null);
  });
});

// ── Post-processing pipeline ─────────────────────────────────────────────────
// Pass 1: Sobel depth → ink outlines
const depthRenderer = scene.enableDepthRenderer(camera,false);
// Geometry buffer gives us depth + normals in screen space
const gbr = scene.enableGeometryBufferRenderer(0.5);  // half-res for perf
const normalTex = gbr ? gbr.getGBuffer().textures[1] : null;

// ── Post-processing: clean Sobel ink outlines + very light halftone ─────────────
// Principle: outlines give form, halftone adds print character, nothing more.

BABYLON.Effect.ShadersStore["inkFragmentShader"]=`
  precision highp float;
  varying vec2 vUV;
  uniform sampler2D textureSampler;
  uniform sampler2D depthSampler;
  uniform sampler2D normalSampler;
  uniform vec2 texelSize;
  uniform float outlineStr;
  uniform float hasNormals;

  float sD(vec2 uv){return texture2D(depthSampler,uv).r;}

  float sobelDepth(){
    float tl=sD(vUV+vec2(-texelSize.x,-texelSize.y));
    float t =sD(vUV+vec2( 0.0,         -texelSize.y));
    float tr=sD(vUV+vec2( texelSize.x, -texelSize.y));
    float l =sD(vUV+vec2(-texelSize.x,  0.0));
    float r2=sD(vUV+vec2( texelSize.x,  0.0));
    float bl=sD(vUV+vec2(-texelSize.x,  texelSize.y));
    float b =sD(vUV+vec2( 0.0,           texelSize.y));
    float br=sD(vUV+vec2( texelSize.x,   texelSize.y));
    float gx=-tl-2.0*l-bl+tr+2.0*r2+br;
    float gy=-tl-2.0*t-tr+bl+2.0*b+br;
    return sqrt(gx*gx+gy*gy);
  }

  float sobelNormal(){
    if(hasNormals<0.5) return 0.0;
    vec3 l =texture2D(normalSampler,vUV+vec2(-texelSize.x, 0.0)).rgb;
    vec3 r2=texture2D(normalSampler,vUV+vec2( texelSize.x, 0.0)).rgb;
    vec3 t2=texture2D(normalSampler,vUV+vec2( 0.0,-texelSize.y)).rgb;
    vec3 b2=texture2D(normalSampler,vUV+vec2( 0.0, texelSize.y)).rgb;
    return length(r2-l)+length(b2-t2);
  }

  void main(){
    vec4 color = texture2D(textureSampler, vUV);

    // Combined edge: depth gives hard edges, normals give silhouette curves
    float edgeD = sobelDepth();
    float edgeN = sobelNormal();
    float edge  = max(edgeD, edgeN * 0.35);
    float outline = smoothstep(0.005, 0.018, edge);

    // Ink colour: very dark navy (not pure black — keeps warmth of scene)
    vec3 ink = vec3(0.01, 0.02, 0.05);
    vec3 result = mix(color.rgb, ink, outline * outlineStr);

    // Subtle vignette
    vec2 c = vUV - 0.5;
    result *= 1.0 - dot(c,c) * 0.55;

    gl_FragColor = vec4(result, 1.0);
  }
`;

const inkPass = new BABYLON.PostProcess('ink','ink',
  ['texelSize','outlineStr','hasNormals'],
  ['depthSampler','normalSampler'],
  1.0, camera);

inkPass.onApply = effect => {
  effect.setTexture('depthSampler', depthRenderer.getDepthMap());
  if (normalTex) {
    effect.setTexture('normalSampler', normalTex);
    effect.setFloat('hasNormals', 1.0);
  } else {
    effect.setTexture('normalSampler', depthRenderer.getDepthMap());
    effect.setFloat('hasNormals', 0.0);
  }
  effect.setFloat2('texelSize', 1/engine.getRenderWidth(), 1/engine.getRenderHeight());
  effect.setFloat('outlineStr', 0.85);
};

// Very light halftone — large cells, low strength, just enough to suggest print texture
BABYLON.Effect.ShadersStore["halftoneFragmentShader"]=`
  precision highp float;
  varying vec2 vUV;
  uniform sampler2D textureSampler;
  uniform vec2 resolution;
  uniform float gridCells;
  uniform float dotStrength;

  void main(){
    vec4 color = texture2D(textureSampler, vUV);
    float aspect = resolution.x / resolution.y;
    vec2 gUV = vec2(vUV.x * aspect, vUV.y) * gridCells;

    // Sample cell colour (pixelated)
    vec2 cell   = (floor(gUV) + 0.5) / gridCells;
    vec2 sampleUV = vec2(cell.x / aspect, cell.y);
    sampleUV = clamp(sampleUV, 0.001, 0.999);
    float luma = dot(texture2D(textureSampler, sampleUV).rgb, vec3(0.299,0.587,0.114));

    // Skip background (dark sky pixels would get the biggest dots — wrong)
    if (luma < 0.07) { gl_FragColor = color; return; }

    // Dot radius: lit geometry gets subtle dot texture
    float radius = sqrt(max(0.0, 1.0 - luma)) * 0.38;
    vec2 cellUV  = fract(gUV) - 0.5;
    float inDot  = 1.0 - smoothstep(radius - 0.025, radius + 0.025, length(cellUV));

    vec3 result = color.rgb * (1.0 - inDot * dotStrength);
    gl_FragColor = vec4(result, 1.0);
  }
`;

const halftonePass = new BABYLON.PostProcess('halftone','halftone',
  ['resolution','gridCells','dotStrength'],[],1.0,camera);
halftonePass.onApply = effect => {
  effect.setFloat2('resolution', engine.getRenderWidth(), engine.getRenderHeight());
  effect.setFloat('gridCells',   45.0);   // large cells = coarse dots, less busy
  effect.setFloat('dotStrength', 0.08);   // 8% — a hint, not a statement
};

// ── Animations ───────────────────────────────────────────────────────────────
const t0=performance.now();
scene.registerBeforeRender(()=>{
  const t=(performance.now()-t0)*0.001;
  Object.entries(animatables).forEach(([key,m],i)=>{
    if(!m._baseY) m._baseY=m.position.y;
    m.rotation.y+=0.005+i*0.001;
    m.position.y=m._baseY+Math.sin(t*0.65+i*1.3)*0.28;
  });
});

// ── Camera navigation ─────────────────────────────────────────────────────────
let autoRotate=true,autoAngle=camera.alpha,pathState=null;
const DROP_T=0.14,ARRIVE_T=0.86,PATH_Y=1.8,TRAVEL_R=4.2,TRAVEL_B=Math.PI/2.05;
function lerp(a,b,t){return a+(b-a)*t;}
function lerpA(a,b,t){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t;}
function ss(t){return t*t*(3-2*t);}
function cr(t,p0,p1,p2,p3){return 0.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t*t+(-p0+3*p1-3*p2+p3)*t*t*t);}
function crT(t,p0,p1,p2,p3){return 0.5*((-p0+p2)+(2*(2*p0-5*p1+4*p2-p3))*t+3*(-p0+3*p1-3*p2+p3)*t*t);}

scene.registerBeforeRender(()=>{
  if(autoRotate&&!pathState){autoAngle-=0.0022;camera.alpha=autoAngle;return;}
  if(!pathState)return;
  pathState.t=Math.min(1,pathState.t+pathState.speed);
  const done=pathState.t>=1;
  if(pathState.t<=DROP_T){
    const dt=ss(pathState.t/DROP_T);
    camera.target.set(lerp(pathState.stx,pathState.pts[0].x,dt*0.3),lerp(pathState.sty,PATH_Y,dt),lerp(pathState.stz,pathState.pts[0].z,dt*0.3));
    camera.beta=lerp(pathState.sb,TRAVEL_B,dt*0.6);camera.radius=lerp(pathState.sr,TRAVEL_R,dt*0.5);
  }else if(pathState.t<=ARRIVE_T){
    const tt=(pathState.t-DROP_T)/(ARRIVE_T-DROP_T);
    const pts=pathState.pts,N=pts.length-1,fi=tt*N,i=Math.min(Math.floor(fi),N-1),lt=fi-i;
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[Math.min(N,i+1)],p3=pts[Math.min(N,i+2)];
    camera.target.set(cr(lt,p0.x,p1.x,p2.x,p3.x),PATH_Y,cr(lt,p0.z,p1.z,p2.z,p3.z));
    const tx=crT(lt,p0.x,p1.x,p2.x,p3.x),tz=crT(lt,p0.z,p1.z,p2.z,p3.z);
    if(Math.abs(tx)+Math.abs(tz)>0.001)camera.alpha=lerpA(camera.alpha,Math.atan2(tz,tx)+Math.PI,0.09);
    camera.beta=lerp(camera.beta,TRAVEL_B,0.06);camera.radius=lerp(camera.radius,TRAVEL_R,0.06);
  }else{
    const at=ss((pathState.t-ARRIVE_T)/(1-ARRIVE_T)),f=at*0.14,et=pathState.et;
    camera.target.x=lerp(camera.target.x,et.x,f);camera.target.y=lerp(camera.target.y,et.y,f);camera.target.z=lerp(camera.target.z,et.z,f);
    camera.alpha=lerpA(camera.alpha,pathState.ea,at*0.13);camera.beta=lerp(camera.beta,pathState.eb,at*0.11);camera.radius=lerp(camera.radius,pathState.er,at*0.11);
  }
  if(done){const cb=pathState.onDone;pathState=null;if(cb)cb();}
});

function stopAuto(){autoRotate=false;}
function flyTo(k){
  stopAuto();pathState=null;scene.stopAnimation(camera);camera.animations.length=0;
  const v=CAM_VIEWS[k];if(!v)return;
  closeFocus();
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.cluster===k));
  const ease=new BABYLON.SineEase();ease.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEINOUT);
  ['alpha','beta','radius'].forEach(prop=>{
    const a=new BABYLON.Animation('f_'+prop,prop,60,BABYLON.Animation.ANIMATIONTYPE_FLOAT,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
    a.setEasingFunction(ease);a.setKeys([{frame:0,value:camera[prop]},{frame:80,value:v[prop]}]);camera.animations.push(a);
  });
  const ta=new BABYLON.Animation('f_t','target',60,BABYLON.Animation.ANIMATIONTYPE_VECTOR3,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
  ta.setEasingFunction(ease);ta.setKeys([{frame:0,value:camera.target.clone()},{frame:80,value:new BABYLON.Vector3(...v.target)}]);
  camera.animations.push(ta);scene.beginAnimation(camera,0,80,false,1,()=>camera.animations.length=0);
}
function rotateToBill(bill){
  scene.stopAnimation(camera);camera.animations.length=0;
  const{x,z}=bill.metadata;
  const clKey=Object.entries(CLUSTERS).find(([,c])=>c.projects.some(p=>p.url===bill.metadata.proj.url))?.[0]||'highlight';
  const cp=CLUSTERS[clKey].pos,dx=cp[0]-x,dz2=cp[2]-z,dist=Math.hypot(dx,dz2)||1;
  const endA=Math.atan2(dz2/dist,dx/dist);
  const ease=new BABYLON.SineEase();ease.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEINOUT);
  ['alpha','beta','radius'].forEach((prop,pi)=>{
    const vals=[endA,Math.PI/2.4,6.0];
    const a=new BABYLON.Animation('r_'+prop,prop,60,BABYLON.Animation.ANIMATIONTYPE_FLOAT,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
    a.setEasingFunction(ease);a.setKeys([{frame:0,value:camera[prop]},{frame:55,value:vals[pi]}]);camera.animations.push(a);
  });
  const ta=new BABYLON.Animation('r_t','target',60,BABYLON.Animation.ANIMATIONTYPE_VECTOR3,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
  ta.setEasingFunction(ease);ta.setKeys([{frame:0,value:camera.target.clone()},{frame:55,value:new BABYLON.Vector3(x,bill.position.y*0.5,z)}]);
  camera.animations.push(ta);scene.beginAnimation(camera,0,55,false,1,()=>{camera.animations.length=0;openFocus(bill);});
}
function flyToBill(bill){
  stopAuto();pathState=null;scene.stopAnimation(camera);camera.animations.length=0;
  const{proj,x,z}=bill.metadata;
  const clKey=Object.entries(CLUSTERS).find(([,c])=>c.projects.some(p=>p.url===proj.url))?.[0]||'highlight';
  const startKey=nearestCluster(camera.target.x,camera.target.z);
  if(startKey===clKey){rotateToBill(bill);return;}
  const route=bfsPath(startKey,clKey);
  const wpts=[new BABYLON.Vector3(camera.target.x,PATH_Y,camera.target.z)];
  for(let i=0;i<route.length-1;i++){
    const ek=[route[i],route[i+1]].sort().join('--'),curve=PATH_CURVES[ek];
    if(curve&&curve.length){const fwd=route[i]===ek.split('--')[0];(fwd?curve:[...curve].reverse()).forEach(p=>wpts.push(new BABYLON.Vector3(p[0],PATH_Y,p[1])));}
    else{const cp2=CLUSTERS[route[i+1]].pos;wpts.push(new BABYLON.Vector3(cp2[0],PATH_Y,cp2[2]));}
  }
  wpts.push(new BABYLON.Vector3(x,bill.position.y*0.5,z));
  let arcLen=0;for(let i=0;i<wpts.length-1;i++)arcLen+=BABYLON.Vector3.Distance(wpts[i],wpts[i+1]);
  const speed=1/((arcLen/18+0.5)*60);
  const cp3=CLUSTERS[clKey].pos,dx2=cp3[0]-x,dz3=cp3[2]-z,dist2=Math.hypot(dx2,dz3)||1;
  pathState={pts:wpts,t:0,speed,stx:camera.target.x,sty:camera.target.y,stz:camera.target.z,sb:camera.beta,sr:camera.radius,et:new BABYLON.Vector3(x,bill.position.y*0.5,z),ea:Math.atan2(dz3/dist2,dx2/dist2),eb:Math.PI/2.4,er:6.0,onDone:()=>openFocus(bill)};
}

function openFocus(bill){
  const{proj}=bill.metadata;
  document.getElementById('focus-name').textContent=proj.name;
  document.getElementById('focus-stars').textContent='★ '+proj.stars.toLocaleString()+'  ·  '+proj.lang;
  document.getElementById('focus-desc').textContent=proj.desc;
  document.getElementById('focus-link').href=proj.url;
  const acc=CLUSTERS[Object.entries(CLUSTERS).find(([,c])=>c.projects.some(p=>p.url===proj.url))?.[0]]?.col||'#4488ff';
  document.getElementById('focus-accent').style.color=acc;
  const logEl=document.getElementById('focus-logo');
  const lu=logoSrc(proj.id);
  if(lu){logEl.src=lu;logEl.style.display='block';}else logEl.style.display='none';
  document.getElementById('focus-panel').classList.add('open');
}
function closeFocus(){document.getElementById('focus-panel').classList.remove('open');}
document.getElementById('focus-close').addEventListener('click',closeFocus);

// Hover + click
let hovered=null;
scene.onPointerObservable.add(e=>{
  if(e.type===BABYLON.PointerEventTypes.POINTERMOVE){
    const hit=scene.pick(scene.pointerX,scene.pointerY);
    const bill=billboards.find(b=>b===hit.pickedMesh);
    if(bill!==hovered){
      if(hovered)hovered.scaling.setAll(1);
      hovered=bill||null;canvas.style.cursor=hovered?'pointer':'grab';
      if(hovered)hovered.scaling.setAll(1.06);
    }
  }
  if(e.type===BABYLON.PointerEventTypes.POINTERDOWN&&e.event.button===0){
    if(hovered){flyToBill(hovered);stopAuto();}else closeFocus();
  }
});

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{if(btn.dataset.cluster==='overview')autoRotate=true;flyTo(btn.dataset.cluster);});
});

const keys=new Set();
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeFocus();return;}
  if(e.code==='Space'){e.preventDefault();autoRotate=!autoRotate;return;}
  const cm={'Digit1':'overview','Digit2':'highlight','Digit3':'piku','Digit4':'ai','Digit5':'terminal','Digit6':'macos','Digit7':'infra'};
  if(cm[e.code]){flyTo(cm[e.code]);return;}
  keys.add(e.code);stopAuto();e.preventDefault();
});
window.addEventListener('keyup',e=>keys.delete(e.code));
scene.registerBeforeRender(()=>{
  const sp=0.022,zp=0.97;
  if(keys.has('KeyA')||keys.has('ArrowLeft'))camera.alpha+=sp;
  if(keys.has('KeyD')||keys.has('ArrowRight'))camera.alpha-=sp;
  if(keys.has('KeyW')||keys.has('ArrowUp'))camera.beta=Math.max(0.08,camera.beta-sp);
  if(keys.has('KeyS')||keys.has('ArrowDown'))camera.beta=Math.min(Math.PI*0.46,camera.beta+sp);
  if(keys.has('Equal')||keys.has('KeyQ'))camera.radius=Math.max(4,camera.radius*zp);
  if(keys.has('Minus')||keys.has('KeyE'))camera.radius=Math.min(140,camera.radius/zp);
});

window.addEventListener('resize',()=>engine.resize());
engine.runRenderLoop(()=>scene.render());

}); // end fetch

</script>
