<!DOCTYPE html>
<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#d8ebff;
  --ink:#10233a;
  --ink-dim:rgba(16,35,58,.68);
  --panel:rgba(255,255,255,.78);
  --panel-strong:rgba(255,255,255,.92);
  --border:rgba(27,78,130,.14);
  --blue:#2563eb;
  --blue-soft:rgba(37,99,235,.12);
  --shadow:0 18px 48px rgba(17,37,56,.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(#cfe6ff,#eef7ff);font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink)}
#cv{width:100%;height:100%;display:block}

#hud-top{
  position:fixed;inset:0 0 auto 0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.25rem;pointer-events:none;
}
#brand,
#top-actions a,
#cluster-nav,
#focus-panel,
#loading,
#hint{pointer-events:auto}
#brand{
  display:flex;align-items:center;gap:.8rem;
  padding:.7rem .95rem;border:1px solid var(--border);border-radius:18px;
  background:var(--panel);backdrop-filter:blur(14px);box-shadow:var(--shadow)
}
#brand .dot{width:.7rem;height:.7rem;border-radius:50%;background:linear-gradient(135deg,#5fb2ff,#2563eb);box-shadow:0 0 0 6px rgba(37,99,235,.08)}
#brand .title{font-weight:800;letter-spacing:-.03em;font-size:.96rem}
#brand .sub{font-size:.72rem;color:var(--ink-dim)}
#top-actions{display:flex;gap:.55rem}
#top-actions a{
  display:inline-flex;align-items:center;gap:.35rem;padding:.65rem .9rem;border-radius:16px;
  text-decoration:none;font-size:.78rem;font-weight:700;color:var(--ink);
  border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(14px);box-shadow:var(--shadow)
}
#top-actions a:hover{background:var(--panel-strong)}

#cluster-nav{
  position:fixed;left:50%;bottom:1.15rem;transform:translateX(-50%);z-index:30;
  display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center;
  max-width:min(96vw,1200px);padding:.55rem .7rem;
  border:1px solid var(--border);border-radius:22px;
  background:rgba(255,255,255,.8);backdrop-filter:blur(14px);box-shadow:var(--shadow)
}
.nav-btn{
  appearance:none;border:none;background:transparent;color:var(--ink-dim);
  font:700 .72rem/1 Inter,system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;
  padding:.55rem .82rem;border-radius:14px;cursor:pointer;transition:.18s ease all
}
.nav-btn:hover{background:var(--blue-soft);color:var(--ink)}
.nav-btn.active{background:var(--blue);color:#fff;box-shadow:0 10px 24px rgba(37,99,235,.25)}

#hint{
  position:fixed;right:1.2rem;bottom:5.4rem;z-index:30;
  padding:.5rem .75rem;border-radius:14px;border:1px solid var(--border);
  background:rgba(255,255,255,.72);backdrop-filter:blur(12px);
  font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-dim)
}

#loading{
  position:fixed;inset:50% auto auto 50%;transform:translate(-50%,-50%);z-index:50;
  padding:.85rem 1.1rem;border-radius:16px;border:1px solid var(--border);
  background:var(--panel-strong);box-shadow:var(--shadow);font-size:.9rem;font-weight:700
}
#loading.hidden{display:none}

#focus-panel{
  position:fixed;right:1.25rem;top:5.2rem;z-index:40;
  width:min(420px,calc(100vw - 2rem));
  padding:1.1rem 1.15rem 1rem;
  border:1px solid var(--border);border-radius:24px;
  background:rgba(255,255,255,.88);backdrop-filter:blur(18px);box-shadow:var(--shadow);
  transform:translateY(12px);opacity:0;pointer-events:none;transition:.22s ease all
}
#focus-panel.open{transform:translateY(0);opacity:1;pointer-events:auto}
#focus-close{
  position:absolute;top:.8rem;right:.85rem;border:none;background:transparent;cursor:pointer;
  color:var(--ink-dim);font-size:1rem;padding:.25rem .4rem;border-radius:10px
}
#focus-close:hover{background:rgba(0,0,0,.04);color:var(--ink)}
#focus-kicker{font-size:.68rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#2f6bc0;margin-bottom:.55rem}
#focus-header{display:flex;gap:.8rem;align-items:flex-start;margin-bottom:.7rem;padding-right:2.2rem}
#focus-logo{width:48px;height:48px;object-fit:contain;display:none;flex-shrink:0;border-radius:12px}
#focus-name{font-size:1.18rem;line-height:1.05;font-weight:800;letter-spacing:-.03em}
#focus-meta{font-size:.76rem;color:var(--ink-dim);margin-top:.25rem}
#focus-desc{font-size:.92rem;line-height:1.6;color:#28425e;margin-bottom:.95rem}
#focus-actions{display:flex;gap:.6rem;flex-wrap:wrap}
#focus-link,#focus-jump{
  display:inline-flex;align-items:center;justify-content:center;gap:.35rem;
  min-height:2.5rem;padding:0 .95rem;border-radius:14px;border:1px solid var(--border);
  text-decoration:none;font-size:.82rem;font-weight:800
}
#focus-link{background:var(--blue);color:#fff;border-color:transparent}
#focus-jump{background:#fff;color:var(--ink)}
#focus-link:hover{filter:brightness(1.05)}
#focus-jump:hover{background:#f5f9ff}

@media (max-width: 900px){
  #hud-top{padding:.85rem .9rem;gap:.8rem;flex-direction:column;align-items:stretch}
  #top-actions{justify-content:space-between}
  #focus-panel{left:1rem;right:1rem;top:auto;bottom:6.4rem;width:auto}
  #hint{display:none}
}
</style>
<script src="/assets/js/babylon.js"></script>
</head>
<body>
<canvas id="cv"></canvas>

<div id="loading">Loading scenic mode…</div>

<div id="hud-top">
  <div id="brand">
    <div class="dot"></div>
    <div>
      <div class="title">rcarmo.github.io</div>
      <div class="sub">scenic mode</div>
    </div>
  </div>
  <div id="top-actions">
    <a href="/">← list view</a>
    <a href="https://taoofmac.com" target="_blank" rel="noopener">taoofmac.com ↗</a>
  </div>
</div>

<nav id="cluster-nav" aria-label="Project sections"></nav>
<div id="hint">WASD to walk • mouse to look • click signs • nav bar to travel</div>

<aside id="focus-panel" aria-live="polite">
  <button id="focus-close" type="button" aria-label="Close">✕</button>
  <div id="focus-kicker">Project</div>
  <div id="focus-header">
    <img id="focus-logo" alt="">
    <div>
      <div id="focus-name"></div>
      <div id="focus-meta"></div>
    </div>
  </div>
  <div id="focus-desc"></div>
  <div id="focus-actions">
    <a id="focus-link" href="#">Open project →</a>
    <button id="focus-jump" type="button">Jump cluster</button>
  </div>
</aside>

<script>
(async function(){
  const loading = document.getElementById('loading');
  const navEl = document.getElementById('cluster-nav');
  const panel = document.getElementById('focus-panel');
  const focusLogo = document.getElementById('focus-logo');
  const focusName = document.getElementById('focus-name');
  const focusMeta = document.getElementById('focus-meta');
  const focusDesc = document.getElementById('focus-desc');
  const focusLink = document.getElementById('focus-link');
  const focusJump = document.getElementById('focus-jump');
  const focusClose = document.getElementById('focus-close');

  const clusterPalette = {
    'ai-agents':  { color:'#2d6dff', tint:'#dce8ff', terrain:'#6b8ec9', foliage:'grove' },
    'ai-ml':      { color:'#7a4cff', tint:'#ece3ff', terrain:'#7f86b8', foliage:'orchard' },
    'cloud':      { color:'#1ba1e3', tint:'#dff5ff', terrain:'#6ea6bf', foliage:'windbreak' },
    'hardware':   { color:'#d97706', tint:'#fff0d7', terrain:'#b8966f', foliage:'scrub' },
    'infrastructure': { color:'#0f9f7a', tint:'#ddfff6', terrain:'#75a18f', foliage:'hedge' },
    'libraries':  { color:'#a16207', tint:'#fff1d8', terrain:'#a79069', foliage:'avenue' },
    'macos':      { color:'#db2777', tint:'#ffe1f0', terrain:'#b38496', foliage:'garden' },
    'terminal':   { color:'#1f7a50', tint:'#e0ffef', terrain:'#78a784', foliage:'pine' },
    'featured':   { color:'#2563eb', tint:'#dce8ff', terrain:'#6b8ec9', foliage:'grove' }
  };

  function escHtml(s){return String(s||'').replace(/[&<>\"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));}

  async function loadProjects(){
    const res = await fetch('/index.html', { cache: 'no-cache' });
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const sections = [...doc.querySelectorAll('.idx-section')].map((section, idx) => {
      const id = section.id ? section.id.replace(/^section-/, '') : (idx === 0 ? 'featured' : `section-${idx}`);
      const label = section.querySelector('.idx-section-title')?.textContent?.trim() || 'Projects';
      const cards = [...section.querySelectorAll('.card')].map(card => ({
        name: card.querySelector('.card-name')?.textContent?.trim() || 'project',
        desc: card.querySelector('.card-tagline')?.textContent?.trim() || '',
        url: card.getAttribute('href') || '#',
        logo: card.querySelector('img')?.getAttribute('src') || '',
        repo: card.getAttribute('data-repo') || ''
      }));
      return { id, label, projects: cards };
    }).filter(section => section.projects.length);
    return sections;
  }

  const sections = await loadProjects();
  loading.classList.add('hidden');

  const canvas = document.getElementById('cv');
  const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:false, stencil:false, antialias:true });
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.84, 0.92, 1.0, 1);
  scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
  scene.fogDensity = 0.0019;
  scene.fogColor = new BABYLON.Color3(0.83, 0.92, 1.0);

  const camera = new BABYLON.UniversalCamera('cam', new BABYLON.Vector3(0, 4, 0), scene);
  camera.attachControl(canvas, true);
  camera.speed = 1.2;
  camera.inertia = 0.82;
  camera.angularSensibility = 3200;
  camera.minZ = 0.5;
  camera.keysUp = [87]; camera.keysDown = [83]; camera.keysLeft = [65]; camera.keysRight = [68];
  camera.ellipsoid = new BABYLON.Vector3(0.5, 0.9, 0.5);
  camera.checkCollisions = false;
  const EYE_HEIGHT = 2.2;

  const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.28, -1, -0.15), scene);
  sun.position = new BABYLON.Vector3(80, 140, 20);
  sun.intensity = 1.9;
  const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
  hemi.intensity = 0.72;
  hemi.groundColor = new BABYLON.Color3(0.38, 0.44, 0.36);

  const shadowGen = new BABYLON.ShadowGenerator(2048, sun);
  shadowGen.usePercentageCloserFiltering = true;
  shadowGen.filteringQuality = BABYLON.ShadowGenerator.QUALITY_MEDIUM;

  const sky = BABYLON.MeshBuilder.CreateSphere('sky', { diameter: 1200, sideOrientation: BABYLON.Mesh.BACKSIDE }, scene);
  const skyMat = new BABYLON.StandardMaterial('skyMat', scene);
  skyMat.disableLighting = true;
  const skyTex = new BABYLON.DynamicTexture('skyTex', { width: 2048, height: 1024 }, scene, false);
  const skyCtx = skyTex.getContext();
  const grad = skyCtx.createLinearGradient(0, 0, 0, 1024);
  grad.addColorStop(0, '#7ec8ff');
  grad.addColorStop(0.45, '#cfe9ff');
  grad.addColorStop(0.75, '#eef7ff');
  grad.addColorStop(1, '#f7eddc');
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 2048, 1024);
  for(let i=0;i<22;i++){
    const x = ((i * 173) % 1800) + 80;
    const y = 120 + ((i * 59) % 260);
    const w = 140 + (i % 5) * 48;
    const h = 32 + (i % 4) * 10;
    skyCtx.fillStyle = `rgba(255,255,255,${0.06 + (i%3)*0.03})`;
    skyCtx.beginPath();
    skyCtx.ellipse(x, y, w, h, 0, 0, Math.PI*2);
    skyCtx.fill();
    skyCtx.beginPath();
    skyCtx.ellipse(x + w*0.3, y + 6, w*0.8, h*0.9, 0, 0, Math.PI*2);
    skyCtx.fill();
  }
  skyTex.update(false);
  skyMat.emissiveTexture = skyTex;
  skyMat.emissiveColor = BABYLON.Color3.White();
  sky.material = skyMat;

  function fract(x){ return x - Math.floor(x); }
  function hash2(x,z){ return fract(Math.sin(x*127.1 + z*311.7) * 43758.5453123); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function smoothstep(t){ return t*t*(3-2*t); }
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
  function mixColor(a,b,t){ return new BABYLON.Color3(lerp(a.r,b.r,t), lerp(a.g,b.g,t), lerp(a.b,b.b,t)); }
  function valueNoise(x,z){
    const xi = Math.floor(x), zi = Math.floor(z);
    const xf = x - xi, zf = z - zi;
    const h00 = hash2(xi, zi), h10 = hash2(xi+1, zi), h01 = hash2(xi, zi+1), h11 = hash2(xi+1, zi+1);
    const u = smoothstep(xf), v = smoothstep(zf);
    return lerp(lerp(h00,h10,u), lerp(h01,h11,u), v);
  }
  function fbm(x,z){
    let t=0, a=1, f=1, sum=0;
    for(let i=0;i<5;i++){ t += valueNoise(x*f, z*f) * a; sum += a; a *= 0.5; f *= 2; }
    return t/sum;
  }

  const spinePath = [];
  const spineLength = 780;
  const spineStep = 6;
  for(let i=0;i<=spineLength;i+=spineStep){
    const x = i - spineLength*0.5;
    const z = Math.sin(i*0.013)*28 + Math.sin(i*0.041)*8 + Math.cos(i*0.009)*12;
    spinePath.push(new BABYLON.Vector3(x, 0, z));
  }

  function nearestSpineDist(x,z){
    let best = Infinity;
    for(let i=0;i<spinePath.length;i++){
      const dx = x-spinePath[i].x, dz = z-spinePath[i].z;
      const d = dx*dx + dz*dz;
      if(d < best) best = d;
    }
    return Math.sqrt(best);
  }
  function terrainHeight(x,z){
    const macro = (fbm(x*0.008, z*0.008)-0.5) * 26;
    const micro = (fbm(x*0.028+12, z*0.028-7)-0.5) * 7;
    const ridge = Math.sin(x*0.012) * 2.8 + Math.cos(z*0.014) * 2.2;
    const d = nearestSpineDist(x,z);
    const pathFlatten = Math.exp(-(d*d)/(22*22));
    return (macro + micro + ridge) * (1 - pathFlatten*0.72) + 0.15;
  }

  const terrain = BABYLON.MeshBuilder.CreateGround('terrain', { width: 980, height: 360, subdivisions: 220 }, scene);
  const terrainPositions = terrain.getVerticesData(BABYLON.VertexBuffer.PositionKind);
  for(let i=0;i<terrainPositions.length;i+=3){
    const x = terrainPositions[i], z = terrainPositions[i+2];
    terrainPositions[i+1] = terrainHeight(x,z);
  }
  terrain.setVerticesData(BABYLON.VertexBuffer.PositionKind, terrainPositions, true);
  const terrainIndices = terrain.getIndices();
  const terrainNormals = [];
  BABYLON.VertexData.ComputeNormals(terrainPositions, terrainIndices, terrainNormals);
  terrain.setVerticesData(BABYLON.VertexBuffer.NormalKind, terrainNormals, true);
  const terrainMat = new BABYLON.StandardMaterial('terrainMat', scene);
  terrainMat.diffuseColor = new BABYLON.Color3(0.58, 0.68, 0.46);
  terrainMat.specularColor = new BABYLON.Color3(0.04, 0.04, 0.04);
  terrainMat.ambientColor = new BABYLON.Color3(0.82, 0.86, 0.8);
  terrain.material = terrainMat;
  terrain.receiveShadows = true;

  function makeMountainBand(zBase, amp, depthColor, peakColor, yOffset){
    const front = [], back = [];
    for(let x=-620; x<=620; x+=18){
      const n = fbm((x+300)*0.006, (zBase+400)*0.01);
      const n2 = fbm((x-120)*0.014, (zBase-90)*0.008);
      const y = yOffset + n*amp + n2*(amp*0.45);
      front.push(new BABYLON.Vector3(x, y, zBase));
      const backZ = zBase > 0 ? zBase + 60 : zBase - 60;
      back.push(new BABYLON.Vector3(x, -20, backZ));
    }
    const band = BABYLON.MeshBuilder.CreateRibbon('mountainBand', { pathArray:[front, back], sideOrientation:BABYLON.Mesh.DOUBLESIDE }, scene);
    const mat = new BABYLON.StandardMaterial('mountainMat', scene);
    mat.diffuseColor = depthColor;
    mat.emissiveColor = peakColor.scale(0.08);
    mat.specularColor = BABYLON.Color3.Black();
    band.material = mat;
  }
  makeMountainBand(-220, 42, new BABYLON.Color3(0.52,0.63,0.74), new BABYLON.Color3(0.8,0.86,0.92), 18);
  makeMountainBand(-280, 30, new BABYLON.Color3(0.58,0.68,0.80), new BABYLON.Color3(0.85,0.90,0.96), 28);
  makeMountainBand(210, 34, new BABYLON.Color3(0.60,0.69,0.78), new BABYLON.Color3(0.82,0.88,0.94), 14);
  makeMountainBand(270, 26, new BABYLON.Color3(0.65,0.73,0.82), new BABYLON.Color3(0.88,0.92,0.97), 22);

  const rockMat = new BABYLON.StandardMaterial('rockMat', scene);
  rockMat.diffuseColor = new BABYLON.Color3(0.52,0.50,0.46);
  rockMat.specularColor = new BABYLON.Color3(0.08,0.08,0.08);
  for(let x=-460;x<=460;x+=12){
    for(let z=-160;z<=160;z+=12){
      const slope = sampleSlope(x,z);
      if(slope < 0.32) continue;
      const rnd = hash2(x*0.13+7, z*0.13-3);
      if(rnd < 0.55) continue;
      const y = terrainHeight(x,z);
      const scale = 0.5 + slope * 1.8 + rnd * 0.6;
      const rock = BABYLON.MeshBuilder.CreateBox('rock', { width:scale*1.4, height:scale*0.7, depth:scale*1.1 }, scene);
      rock.position.set(x, y + scale*0.2, z);
      rock.rotation.y = rnd * Math.PI * 2;
      rock.rotation.x = (hash2(x*0.09,z*0.09)-0.5)*0.3;
      rock.material = rockMat;
      rock.receiveShadows = true;
      shadowGen.addShadowCaster(rock);
    }
  }

  function loadAtlasTexture(url){
    const tex = new BABYLON.Texture(url, scene, false, true, BABYLON.Texture.BILINEAR_SAMPLINGMODE);
    tex.hasAlpha = true;
    tex.wrapU = BABYLON.Texture.CLAMP_ADDRESSMODE;
    tex.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    return tex;
  }
  const treesNearTex = loadAtlasTexture('/assets/sprites/trees-near.png');
  const bushTex = loadAtlasTexture('/assets/sprites/bush.png');
  const grassTex = loadAtlasTexture('/assets/sprites/grass.png');

  function buildAtlasMat(name, tex){
    const mat = new BABYLON.StandardMaterial(name, scene);
    mat.diffuseTexture = tex;
    mat.opacityTexture = tex;
    mat.useAlphaFromDiffuseTexture = true;
    mat.backFaceCulling = false;
    mat.specularColor = new BABYLON.Color3(0.02,0.03,0.02);
    mat.emissiveColor = new BABYLON.Color3(0.08,0.10,0.06);
    return mat;
  }
  function buildAtlasCellBase(name, tex, cellIdx, gridX, gridY, width, height){
    const cellX = cellIdx % gridX;
    const cellY = Math.floor(cellIdx / gridX);
    const u0 = cellX / gridX, u1 = (cellX+1) / gridX;
    const v0 = cellY / gridY, v1 = (cellY+1) / gridY;
    const p1 = BABYLON.MeshBuilder.CreatePlane(name+'A', {width,height,sideOrientation:BABYLON.Mesh.DOUBLESIDE}, scene);
    const p2 = BABYLON.MeshBuilder.CreatePlane(name+'B', {width,height,sideOrientation:BABYLON.Mesh.DOUBLESIDE}, scene);
    p1.position.y = height*0.5;
    p2.position.y = height*0.5;
    p2.rotation.y = Math.PI*0.5;
    [p1,p2].forEach(p => {
      const uvs = p.getVerticesData(BABYLON.VertexBuffer.UVKind);
      for(let i=0;i<uvs.length;i+=2){
        uvs[i] = u0 + uvs[i]*(u1-u0);
        uvs[i+1] = v0 + uvs[i+1]*(v1-v0);
      }
      p.setVerticesData(BABYLON.VertexBuffer.UVKind, uvs);
    });
    const merged = BABYLON.Mesh.MergeMeshes([p1,p2], true, true, undefined, false, true);
    merged.material = buildAtlasMat(name+'Mat', tex);
    merged.isVisible = false;
    return merged;
  }

  const treeBases = [];
  for(let i=0;i<8;i++) treeBases.push(buildAtlasCellBase('tree'+i, treesNearTex, i, 4, 2, 5.0, 6.0));
  const bushBases = [];
  for(let i=0;i<8;i++) bushBases.push(buildAtlasCellBase('bush'+i, bushTex, i, 4, 2, 2.8, 2.0));
  const grassBases = [];

  function scatterClusterFoliage(anchor, tangent, normal, palette, sectionIndex){

      for(let i=0;i<4;i++) place(-8 + i*5, 18, 'birch', 0.8 + (i%2)*0.1);
      for(let i=0;i<8;i++) place(-12 + i*3.4, -4 - (i%3)*2.2, 'shrub', 0.55 + (i%2)*0.08);
    } else if(variant === 'scrub') {
      for(let i=0;i<12;i++) place(-12 + (i%6)*4.4, -2 + Math.floor(i/6)*4.6, i%4===0 ? 'round' : 'shrub', 0.45 + (i%5)*0.08);
      for(let i=0;i<6;i++) place(-10 + i*4, 12, 'shrub', 0.4 + (i%3)*0.06);
    } else if(variant === 'garden') {
      for(let i=0;i<8;i++) place(-10 + (i%4)*5.5, 3 + Math.floor(i/4)*6, i%3===0 ? 'birch' : 'round', 0.7 + (i%3)*0.08);

    } else if(variant === 'hedge') {
      for(let i=0;i<18;i++) place(-14 + i*1.6, 7, 'shrub', 0.45 + (i%3)*0.03);
      for(let i=0;i<18;i++) place(-14 + i*1.6, -3, 'shrub', 0.45 + (i%3)*0.03);
      for(let i=0;i<6;i++) place(-10 + i*4.2, 11, i%2===0 ? 'round' : 'birch', 0.72 + (i%2)*0.1);
    } else if(variant === 'avenue') {
      for(let i=0;i<10;i++) { place(-12 + i*2.8, 8, i%3===0 ? 'birch' : 'round', 0.78); place(-12 + i*2.8, -5, 'round', 0.78); }

      for(let i=0;i<10;i++) place(-10 + i*2.5, -5, 'shrub', 0.52 + (i%2)*0.06);
    } else if(variant === 'orchard') {
      for(let r=0;r<3;r++) for(let c2=0;c2<5;c2++) place(-10 + c2*4.8, r*5, 'round', 0.7 + ((r+c2)%2)*0.08);
      for(let i=0;i<10;i++) place(-10 + (i%5)*4, -4.5 + Math.floor(i/5)*17, 'shrub', 0.46 + (i%3)*0.04);

      for(let i=0;i<14;i++) place(-11 + (i%4)*5.5, 3 + Math.floor(i/4)*5.2, ['pine','round','birch'][i%3], 0.8 + (i%4)*0.08);
      for(let i=0;i<12;i++) place(-12 + (i%6)*4, -4 + Math.floor(i/6)*4.2, 'shrub', 0.48 + (i%4)*0.05);

  }

  const biomeProfiles = {

  const footPathRoutes = [];

  function hexColor(hex){ return BABYLON.Color3.FromHexString(hex); }
  function segDist2(x,z,ax,az,bx,bz){
    const abx = bx-ax, abz = bz-az;
    const apx = x-ax, apz = z-az;
    const denom = abx*abx + abz*abz || 1;
    const t = clamp((apx*abx + apz*abz)/denom, 0, 1);
    const dx = ax + abx*t - x, dz = az + abz*t - z;
    return dx*dx + dz*dz;
  }
  function nearestPolylineDist(x,z, poly){
    let best = Infinity;
    for(let i=0;i<poly.length-1;i++){
      const a = poly[i], b = poly[i+1];
      best = Math.min(best, segDist2(x,z,a.x,a.z,b.x,b.z));
    }
    return Math.sqrt(best);
  }
  function nearestFootpathDist(x,z){
    let best = Infinity;
    for(const route of footPathRoutes) best = Math.min(best, nearestPolylineDist(x,z, route));
    return best;
  }
  function sampleSlope(x,z){
    const hL = terrainHeight(x-1.2,z), hR = terrainHeight(x+1.2,z), hD = terrainHeight(x,z-1.2), hU = terrainHeight(x,z+1.2);
    const nx = hL - hR, nz = hD - hU;
    return clamp(Math.sqrt(nx*nx + nz*nz) / 3.2, 0, 1);
  }
  function sampleBiomeField(x,z){
    let total = 0;
    const weighted = clusterAnchors.map(cluster => {
      const dx = x - cluster.anchor.x, dz = z - cluster.anchor.z;
      const d2 = dx*dx + dz*dz;
      const w = 1 / Math.pow(Math.max(18, Math.sqrt(d2)), 1.35);
      total += w;
      return { cluster, w };
    });
    weighted.sort((a,b)=>b.w-a.w);
    const top = weighted[0]?.cluster || clusterAnchors[0];
    return {
      dominant: top,
      weights: weighted,
      influence: weighted.slice(0,3).map(entry => ({ cluster: entry.cluster, weight: total ? entry.w/total : 0 }))
    };
  }
  function createPathTexture(name, base, fleck, stripe){
    const dt = new BABYLON.DynamicTexture(name, { width:1024, height:1024 }, scene, false);
    const ctx = dt.getContext();
    ctx.fillStyle = base; ctx.fillRect(0,0,1024,1024);
    for(let i=0;i<2400;i++){
      const x = (i*73)%1024, y = (i*151)%1024, r = 1 + (i%3);
      ctx.fillStyle = i%7===0 ? stripe : fleck;

    }
    for(let y=0;y<1024;y+=64){
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect(0,y,1024,10);
    }
    dt.update(false);
    return dt;
  }
  function buildPathRibbon(points, width, name, material){
    if(points.length < 3) return null;
    const left = [], right = [];
    for(let i=0;i<points.length;i++){
      const prev = points[Math.max(0,i-1)], next = points[Math.min(points.length-1,i+1)];
      const tangent = next.subtract(prev).normalize();
      const normal = new BABYLON.Vector3(-tangent.z, 0, tangent.x);
      const endTaper = Math.min(i/3, (points.length-1-i)/3, 1.0);
      const w = width * endTaper;
      left.push(new BABYLON.Vector3(points[i].x + normal.x*w, points[i].y, points[i].z + normal.z*w));
      right.push(new BABYLON.Vector3(points[i].x - normal.x*w, points[i].y, points[i].z - normal.z*w));
    }
    const ribbon = BABYLON.MeshBuilder.CreateRibbon(name, { pathArray:[left,right], sideOrientation:BABYLON.Mesh.DOUBLESIDE }, scene);
    ribbon.material = material;
    ribbon.receiveShadows = true;
    return ribbon;
  }
  function createFootpaths(){
    const pathTex = createPathTexture('footPathTex', '#7d6a52', 'rgba(74,58,41,0.12)', 'rgba(233,220,189,0.05)');
    const edgeTex = createPathTexture('footPathEdgeTex', '#9e8d6b', 'rgba(84,72,55,0.08)', 'rgba(255,255,255,0.03)');
    const pathMat = new BABYLON.StandardMaterial('footPathMat', scene);
    pathMat.diffuseTexture = pathTex;
    pathMat.specularColor = new BABYLON.Color3(0.05,0.04,0.03);
    pathMat.zOffset = -2;
    const edgeMat = new BABYLON.StandardMaterial('footPathEdgeMat', scene);
    edgeMat.diffuseTexture = edgeTex;
    edgeMat.specularColor = BABYLON.Color3.Black();
    edgeMat.zOffset = -1;

    for(let i=0;i<clusterAnchors.length;i++){
      const ca = clusterAnchors[i];
      const nearestIdx = spinePath.reduce((best, p, idx) => {
        const d = BABYLON.Vector3.DistanceSquared(p, new BABYLON.Vector3(ca.anchor.x, 0, ca.anchor.z));
        return !best || d < best.d ? { idx, d } : best;
      }, null).idx;
      const spinePoint = new BABYLON.Vector3(spinePath[nearestIdx].x, terrainHeight(spinePath[nearestIdx].x, spinePath[nearestIdx].z)+0.08, spinePath[nearestIdx].z);
      const clusterPoint = new BABYLON.Vector3(ca.anchor.x, terrainHeight(ca.anchor.x, ca.anchor.z)+0.08, ca.anchor.z);
      const mid = BABYLON.Vector3.Lerp(spinePoint, clusterPoint, 0.5);
      mid.x += (fbm(ca.anchor.x*0.02, ca.anchor.z*0.02)-0.5)*8;
      mid.z += (fbm(ca.anchor.z*0.02, ca.anchor.x*0.02)-0.5)*8;
      mid.y = terrainHeight(mid.x, mid.z)+0.08;
      const spurPoints = BABYLON.Curve3.CreateCatmullRomSpline([spinePoint, mid, clusterPoint], 24).getPoints().map(p => new BABYLON.Vector3(p.x, terrainHeight(p.x,p.z)+0.08, p.z));
      footPathRoutes.push(spurPoints);
      buildPathRibbon(spurPoints, 1.6, 'spurEdge_'+i, edgeMat);
      buildPathRibbon(spurPoints, 1.0, 'spur_'+i, pathMat);
    }

    for(let i=0;i<clusterAnchors.length-1;i++){
      const a = clusterAnchors[i], b = clusterAnchors[i+1];
      const start = a.anchor.clone(), end = b.anchor.clone();
      const dir = end.subtract(start);
      const len = Math.sqrt(dir.x*dir.x + dir.z*dir.z) || 1;
      const side = new BABYLON.Vector3(-dir.z/len, 0, dir.x/len);
      const m1 = BABYLON.Vector3.Lerp(start, end, 0.28).add(side.scale((fbm(start.x*0.01, end.z*0.01)-0.5)*18));
      const m2 = BABYLON.Vector3.Lerp(start, end, 0.72).add(side.scale((fbm(end.x*0.01, start.z*0.01)-0.5)*-18));
      [m1,m2].forEach(p => p.y = terrainHeight(p.x,p.z) + 0.08);
      const sampled = BABYLON.Curve3.CreateCatmullRomSpline([start,m1,m2,end], 40).getPoints().map(p => new BABYLON.Vector3(p.x, terrainHeight(p.x,p.z)+0.08, p.z));
      footPathRoutes.push(sampled);
      buildPathRibbon(sampled, 2.0, 'footPathEdge', edgeMat);
      buildPathRibbon(sampled, 1.25, 'footPath', pathMat);
      for(let j=4;j<sampled.length-4;j+=9){
        const p = sampled[j];
        const pebble = BABYLON.MeshBuilder.CreateSphere('pebble', { diameter:0.14 + (j%3)*0.05, segments:4 }, scene);
        pebble.position.set(p.x + Math.sin(j)*0.9, terrainHeight(p.x,p.z)+0.03, p.z + Math.cos(j*1.7)*0.9);
        const pebbleMat = new BABYLON.StandardMaterial('pebbleMat', scene);
        pebbleMat.diffuseColor = new BABYLON.Color3(0.58,0.55,0.50);
        pebbleMat.specularColor = BABYLON.Color3.Black();
        pebble.material = pebbleMat;
      }
    }
  }
  function createTerrainLook(){
    const surface = new BABYLON.DynamicTexture('terrainSurface', { width:512, height:256 }, scene, false);
    const mask = new BABYLON.DynamicTexture('terrainMask', { width:512, height:256 }, scene, false);
    const detail = new BABYLON.DynamicTexture('terrainDetail', { width:256, height:256 }, scene, false);
    const sctx = surface.getContext();
    const mctx = mask.getContext();
    const dctx = detail.getContext();
    const width = 512, height = 256;
    const img = sctx.createImageData(width, height);
    const maskImg = mctx.createImageData(width, height);
    for(let py=0;py<height;py++){
      for(let px=0;px<width;px++){
        const wx = (px/(width-1))*980 - 490;
        const wz = (py/(height-1))*360 - 180;
        const h = terrainHeight(wx,wz);
        const slope = sampleSlope(wx,wz);
        const pathD = footPathRoutes.length ? nearestFootpathDist(wx,wz) : 999;
        const spineD = nearestSpineDist(wx,wz);
        const biome = sampleBiomeField(wx,wz);
        let base = new BABYLON.Color3(0.62,0.71,0.49);
        let meadowBoost = 0, shrubBoost = 0;
        biome.influence.forEach(({cluster, weight}) => {
          const profile = biomeProfiles[(clusterPalette[cluster.id]||{}).foliage || 'grove'] || biomeProfiles.grove;
          base = mixColor(base, hexColor(profile.ground), weight*1.15);
          meadowBoost += profile.grassDensity * weight;
          shrubBoost += profile.shrubDensity * weight;
        });
        const dry = valueNoise(wx*0.022 + 31, wz*0.022 - 17);
        const lush = clamp((1-slope)*1.15,0,1) * clamp(1 - Math.max(0,h-8)/20, 0.4, 1);
        const rock = clamp((slope-0.22)/0.48,0,1) * (0.65 + clamp((h-4)/18,0,1)*0.5);
        const pathMask = clamp(1 - pathD/3.8, 0, 1);
        const spineMask = clamp(1 - spineD/8.0, 0, 1) * 0.35;
        const dirtMask = clamp(pathMask + spineMask + clamp((dry-0.78)/0.22,0,1)*0.3, 0, 1);
        let col = mixColor(base, hexColor('#8dae69'), lush*0.28 + meadowBoost*0.08);
        col = mixColor(col, hexColor('#7d735c'), rock);
        col = mixColor(col, hexColor('#8d7659'), dirtMask*0.85);
        col = mixColor(col, hexColor('#b3aa79'), clamp((dry-0.62)/0.38,0,1)*0.35);
        const idx = (py*width + px) * 4;
        img.data[idx] = Math.round(clamp(col.r,0,1)*255);
        img.data[idx+1] = Math.round(clamp(col.g,0,1)*255);
        img.data[idx+2] = Math.round(clamp(col.b,0,1)*255);
        img.data[idx+3] = 255;
        maskImg.data[idx] = Math.round(pathMask*255);
        maskImg.data[idx+1] = Math.round(rock*255);
        maskImg.data[idx+2] = Math.round(clamp(lush*0.75 + meadowBoost*0.25 - dirtMask*0.3,0,1)*255);
        maskImg.data[idx+3] = 255;
      }
    }
    sctx.putImageData(img, 0, 0);
    mctx.putImageData(maskImg, 0, 0);
    for(let y=0;y<256;y++){
      for(let x=0;x<256;x++){
        const n1 = valueNoise(x*0.045,y*0.045);
        const n2 = fbm(x*0.012,y*0.012);
        const g = Math.floor((0.36 + n1*0.34 + n2*0.22) * 255);

    mask.wrapU = mask.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    detail.wrapU = detail.wrapV = BABYLON.Texture.WRAP_ADDRESSMODE;

    BABYLON.Effect.ShadersStore.terrainVertexShader = `
      precision highp float;
      attribute vec3 position;
      attribute vec3 normal;
      attribute vec2 uv;
      uniform mat4 worldViewProjection;
      uniform mat4 world;
      varying vec3 vPos;
      varying vec3 vNormal;
      varying vec2 vUV;
      void main(void){
        vec4 wp = world * vec4(position, 1.0);
        vPos = wp.xyz;
        vNormal = normalize((world * vec4(normal, 0.0)).xyz);
        vUV = uv;
        gl_Position = worldViewProjection * vec4(position, 1.0);
      }
    `;
    BABYLON.Effect.ShadersStore.terrainFragmentShader = `
      precision highp float;
      varying vec3 vPos;
      varying vec3 vNormal;
      varying vec2 vUV;
      uniform sampler2D surfaceMap;
      uniform sampler2D maskMap;
      uniform sampler2D detailMap;
      uniform vec3 sunDir;
      uniform vec3 fogColor;
      uniform vec3 cameraPosition;

      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
      float noise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        f = f*f*(3.0-2.0*f);
        float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
        return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
      }
      float fbmShader(vec2 p){
        float v = 0.0, a = 0.5;
        for(int i=0; i<4; i++){ v += a*noise(p); p *= 2.01; a *= 0.5; }
        return v;
      }

      void main(void){
        vec3 base = texture2D(surfaceMap, vUV).rgb;
        vec3 masks = texture2D(maskMap, vUV).rgb;
        vec3 detail = texture2D(detailMap, vUV * vec2(9.0, 3.5)).rgb * 2.0 - 1.0;

        // Grass detail tiling
        float grassNoise = fbmShader(vPos.xz * 0.18) * 0.15;
        float grassFine = noise(vPos.xz * 1.2) * 0.08;
        vec3 grassTint = vec3(0.05, 0.08, -0.02) * grassNoise + vec3(-0.02, 0.03, -0.01) * grassFine;
        base += grassTint * masks.b;

        // Rock detail tiling
        float rockNoise = fbmShader(vPos.xz * 0.35) * 0.12;
        vec3 rockDetail = vec3(rockNoise * 0.8, rockNoise * 0.75, rockNoise * 0.7);
        base = mix(base, base + rockDetail - 0.06, masks.g);

        // Dirt detail on paths
        float dirtNoise = noise(vPos.xz * 0.8) * 0.06;
        base += vec3(dirtNoise, dirtNoise*0.8, dirtNoise*0.5) * masks.r;

        vec3 n = normalize(vNormal + vec3(detail.r * 0.22 * (1.0-masks.g), 0.12 * (masks.b - masks.r), detail.g * 0.22 * (1.0-masks.g)));
        vec3 L = normalize(-sunDir);
        vec3 V = normalize(cameraPosition - vPos);
        vec3 H = normalize(L + V);
        float sun = max(dot(n, L), 0.0);
        float hemi = 0.42 + 0.58 * clamp(n.y * 0.5 + 0.5, 0.0, 1.0);
        float rim = pow(1.0 - max(dot(n, V), 0.0), 3.0);
        float spec = pow(max(dot(n, H), 0.0), 32.0) * 0.15 * (1.0 - masks.g);

        // Ambient occlusion from height
        float ao = clamp(0.7 + vPos.y * 0.025, 0.5, 1.0);

        vec3 color = base * (0.18 + sun * 1.0 + hemi * 0.55) * ao;
        color += vec3(0.95, 0.92, 0.85) * spec;
        color += vec3(0.04, 0.06, 0.08) * rim * 0.22;

        // Subsurface scatter hint for grass
        float sss = max(dot(-V, L), 0.0) * masks.b * 0.08;
        color += vec3(0.15, 0.22, 0.05) * sss;

        float dist = distance(cameraPosition, vPos);
        float fog = 1.0 - exp(-dist * 0.0020);
        color = mix(color, fogColor, clamp(fog, 0.0, 0.90));
        gl_FragColor = vec4(color, 1.0);
      }
    `;
    const shader = new BABYLON.ShaderMaterial('terrainShader', scene, { vertex:'terrain', fragment:'terrain' }, {
      attributes:['position','normal','uv'],
      uniforms:['worldViewProjection','world','sunDir','fogColor','cameraPosition'],
      samplers:['surfaceMap','maskMap','detailMap']
    });
    shader.setTexture('surfaceMap', surface);
    shader.setTexture('maskMap', mask);
    shader.setTexture('detailMap', detail);
    shader.setVector3('sunDir', sun.direction);
    shader.setColor3('fogColor', scene.fogColor);
    shader.setVector3('cameraPosition', camera.position);
    terrain.material = shader;
  }
  function scatterEcology(){
    for(let x=-480;x<=480;x+=5.0){
      for(let z=-170;z<=170;z+=5.0){
        const jitterX = (hash2(x*0.21,z*0.21)-0.5)*2.8;
        const jitterZ = (hash2(z*0.17,x*0.17)-0.5)*2.8;
        const px = x + jitterX, pz = z + jitterZ;
        const pathD = footPathRoutes.length ? nearestFootpathDist(px,pz) : 999;
        const spineD = nearestSpineDist(px,pz);
        if(pathD < 1.6 || spineD < 3.8) continue;
        const slope = sampleSlope(px,pz);
        if(slope > 0.52) continue;
        const biome = sampleBiomeField(px,pz);
        const profile = biomeProfiles[(clusterPalette[biome.dominant?.id]||{}).foliage || 'grove'] || biomeProfiles.grove;
        const density = profile.grassDensity * clamp(1 - slope*1.35, 0, 1) * clamp(pathD/7, 0.15, 1) * clamp(spineD/12, 0.3, 1);
        const rnd = hash2(px*0.19 + 9, pz*0.19 - 4);
        if(rnd < density * 0.38){
          makeGrassClump(px, pz, 0.45 + hash2(px*0.31,pz*0.31)*0.65);
        }
        if(rnd > 0.86 && profile.shrubDensity > 0.12 && pathD > 3.0){
          makeShrub(px,pz, 0.42 + hash2(px*0.41,pz*0.41)*0.34);
        }
        const foliageKind = (clusterPalette[biome.dominant?.id] || {}).foliage || 'grove';
        if(rnd > 0.94 && foliageKind !== 'scrub' && foliageKind !== 'garden' && pathD > 4.5 && spineD > 6){
          const treeKinds = foliageKind === 'pine' ? ['pine','pine','birch'] : ['round','round','birch','pine'];
          const treeKind = treeKinds[Math.floor(hash2(px*0.29,pz*0.29)*treeKinds.length)];
          makeTree(px,pz, 0.65 + hash2(px*0.37,pz*0.37)*0.5, treeKind);
        }
        if(rnd > 0.95 && hash2(px*0.07,pz*0.07) > 0.65 && pathD > 2.8){
          makeGrassClump(px, pz, 0.35 + hash2(px*0.24,pz*0.24)*0.35);
        }
      }
    }
  }

  sections.forEach((section, sectionIndex) => {
    const palette = clusterPalette[section.id] || { color:'#2563eb', tint:'#dce8ff', terrain:'#7aa0cf' };
    const color = palette.color;
    const tint = palette.tint;
    const spineIdx = Math.floor((sectionIndex + 1) * (spinePath.length - 20) / (sections.length + 1));
    const center = spinePath[spineIdx];
    const prev = spinePath[Math.max(0, spineIdx-1)];
    const next = spinePath[Math.min(spinePath.length-1, spineIdx+1)];
    const tangent = next.subtract(prev).normalize();
    const normal = new BABYLON.Vector3(-tangent.z, 0, tangent.x);
    const side = sectionIndex % 2 === 0 ? 1 : -1;
    const anchor = new BABYLON.Vector3(center.x + normal.x*18*side, terrainHeight(center.x + normal.x*18*side, center.z + normal.z*18*side), center.z + normal.z*18*side);
    const faceDir = center.subtract(anchor).normalize();
    clusterAnchors.push({ id: section.id, label: section.label, center, anchor, color, projects: section.projects, faceDir, tangent, normal, side });

    const titleSign = addProjectSign({
      name: section.label,
      desc: `${section.projects.length} projects in this area`,
      url: section.projects[0]?.url || '/',
      logo: section.projects[0]?.logo || ''
    }, anchor.add(new BABYLON.Vector3(0,0,0)), color, tint, faceDir);
    titleSign.scaling.scaleInPlace(1.14);
    titleSign.metadata = { clusterId: section.id, clusterOnly: true, label: section.label };

    section.projects.slice(0,6).forEach((project, i) => {
      const row = Math.floor(i/3), col = i%3;
      const dx = (col-1) * 6.2 + (row%2)*1.6;
      const dz = 7.5 + row*6.5;
      const px = anchor.x + normal.x*dx + tangent.x*dz*side;
      const pz = anchor.z + normal.z*dx + tangent.z*dz*side;
      const py = terrainHeight(px,pz);
      addProjectSign(project, new BABYLON.Vector3(px, py, pz), color, tint, faceDir);
    });

    const navBtn = document.createElement('button');
    navBtn.className = 'nav-btn' + (sectionIndex === 0 ? ' active' : '');
    navBtn.textContent = section.label;
    navBtn.dataset.cluster = section.id;
    navBtn.addEventListener('click', () => focusCluster(section.id));
    navEl.appendChild(navBtn);
  });

  createFootpaths();
  clusterAnchors.forEach((ca, idx) => {
    const palette = clusterPalette[ca.id] || { color:'#2563eb', tint:'#dce8ff', foliage:'grove' };
    const spineIdx = Math.floor((idx + 1) * (spinePath.length - 20) / (clusterAnchors.length + 1));
    const center = spinePath[spineIdx];
    const prev = spinePath[Math.max(0, spineIdx-1)];
    const next = spinePath[Math.min(spinePath.length-1, spineIdx+1)];
    const tangent = next.subtract(prev).normalize();
    const normal = new BABYLON.Vector3(-tangent.z, 0, tangent.x);
    const side = idx % 2 === 0 ? 1 : -1;
    scatterClusterFoliage(ca.anchor, tangent.scale(side), normal.scale(side), palette, idx);
  });
  createTerrainLook();
  scatterEcology();

  let activeCluster = clusterAnchors[0]?.id || null;
  function setActiveNav(id){
    [...navEl.querySelectorAll('.nav-btn')].forEach(btn => btn.classList.toggle('active', btn.dataset.cluster === id));
  }

  let focusMesh = null;
  function openFocus(meta){
    panel.classList.add('open');
    focusName.textContent = meta.name || meta.label || 'Project';
    focusMeta.textContent = meta.repo || meta.label || '';
    focusDesc.textContent = meta.desc || '';
    focusLink.href = meta.url || '/';
    focusJump.textContent = meta.clusterOnly ? 'Walk here' : 'Walk to cluster';
    focusJump.onclick = () => walkToCluster(meta.clusterId || activeCluster || clusterAnchors[0]?.id);
    if(meta.logo){ focusLogo.src = meta.logo; focusLogo.style.display = 'block'; }
    else { focusLogo.style.display = 'none'; }
  }
  function closeFocus(){ panel.classList.remove('open'); focusMesh = null; }
  focusClose.addEventListener('click', closeFocus);

  function findNearestPathPoint(pos){
    let best = null, bestD = Infinity;
    for(const route of footPathRoutes){
      for(let i=0;i<route.length;i++){
        const dx = pos.x - route[i].x, dz = pos.z - route[i].z;
        const d = dx*dx + dz*dz;
        if(d < bestD){ bestD = d; best = { route, index: i }; }
      }
    }
    for(let i=0;i<spinePath.length;i++){
      const dx = pos.x - spinePath[i].x, dz = pos.z - spinePath[i].z;
      const d = dx*dx + dz*dz;
      if(d < bestD){ bestD = d; best = { route: spinePath, index: i }; }
    }
    return best;
  }

  let walkPath = null;
  let walkIndex = 0;
  let walkSpeed = 18;
  let isWalking = false;

  function walkToCluster(id){
    const cluster = clusterAnchors.find(c => c.id === id);
    if(!cluster) return;
    activeCluster = id;
    setActiveNav(id);
    const target = cluster.anchor;
    const start = findNearestPathPoint(camera.position);
    const end = findNearestPathPoint(target);
    if(!start || !end) return;
    const points = [];
    if(start.route === end.route){
      const lo = Math.min(start.index, end.index);
      const hi = Math.max(start.index, end.index);
      for(let i=lo;i<=hi;i++) points.push(start.route[i]);
      if(start.index > end.index) points.reverse();
    } else {
      for(let i=start.index;i<start.route.length;i++) points.push(start.route[i]);
      const spineStart = findNearestPathPoint(points[points.length-1] || camera.position);
      const spineEnd = findNearestPathPoint(target);
      if(spineStart && spineEnd && spineStart.route === spinePath && spineEnd.route === spinePath){
        const lo = Math.min(spineStart.index, spineEnd.index);
        const hi = Math.max(spineStart.index, spineEnd.index);
        const seg = [];
        for(let i=lo;i<=hi;i++) seg.push(spinePath[i]);
        if(spineStart.index > spineEnd.index) seg.reverse();
        points.push(...seg);
      }
      for(let i=0;i<=end.index && i<end.route.length;i++) points.push(end.route[i]);
    }
    if(points.length > 1){
      walkPath = points.map(p => new BABYLON.Vector3(p.x, terrainHeight(p.x,p.z) + EYE_HEIGHT, p.z));
      walkIndex = 0;
      isWalking = true;
      autoWalk = false;
      userControl = false;
    }
    openFocus({ name: cluster.label, desc: cluster.projects.length + ' project' + (cluster.projects.length!==1?'s':'') + ' nearby', url: cluster.projects[0]?.url || '/', logo: cluster.projects[0]?.logo || '', repo: cluster.id, clusterOnly: true, clusterId: cluster.id });
  }

  function focusCluster(id){ walkToCluster(id); }

  const pointer = scene.onPointerObservable.add((info) => {
    if(info.type !== BABYLON.PointerEventTypes.POINTERPICK) return;
    const pick = info.pickInfo;
    if(!pick || !pick.hit || !pick.pickedMesh) return;
    const meta = pick.pickedMesh.metadata;
    if(!meta) return;
    if(meta.clusterOnly){ walkToCluster(meta.clusterId); return; }
    focusMesh = pick.pickedMesh;
    activeCluster = (clusterAnchors.find(c => c.projects.some(p => p.url === meta.url)) || {}).id || activeCluster;
    setActiveNav(activeCluster);
    openFocus(meta);
  });

  function posOnSpine(t){
    const idx = Math.floor(t * (spinePath.length-1));
    const p = spinePath[Math.min(idx, spinePath.length-1)];
    return new BABYLON.Vector3(p.x, terrainHeight(p.x,p.z) + EYE_HEIGHT, p.z);
  }
  function dirOnSpine(t){
    const idx = Math.floor(t * (spinePath.length-1));
    const p = spinePath[Math.min(idx, spinePath.length-1)];
    const next = spinePath[Math.min(idx+3, spinePath.length-1)];
    return new BABYLON.Vector3(next.x - p.x, 0, next.z - p.z).normalize();
  }

  let autoWalk = true;
  let autoT = 0.02;
  let userControl = false;
  scene.onPointerDown = () => {
    if(!isWalking){ autoWalk = false; userControl = true; }
  };

  const startPos = posOnSpine(autoT);
  const startDir = dirOnSpine(autoT);
  camera.position = startPos.clone();
  camera.setTarget(startPos.add(startDir));

  function disableCameraInput(){ camera.detachControl(); }
  function enableCameraInput(){ camera.attachControl(canvas, true); }

  scene.registerBeforeRender(() => {
    const dt = engine.getDeltaTime() / 1000;
    if(isWalking && walkPath){
      disableCameraInput();
      const target = walkPath[walkIndex];
      const dir = target.subtract(camera.position);
      dir.y = 0;
      const dist = dir.length();
      if(dist < 0.8){
        walkIndex++;
        if(walkIndex >= walkPath.length){
          isWalking = false;
          walkPath = null;
          autoWalk = false;
          userControl = true;
          enableCameraInput();
        }
      } else {
        const speed = Math.min(walkSpeed * dt, dist);
        const step = dir.normalize().scale(speed);
        camera.position.x += step.x;
        camera.position.z += step.z;
        const lookTarget = camera.position.add(dir.normalize().scale(10));
        lookTarget.y = camera.position.y;
        const currentTarget = camera.getTarget();
        camera.setTarget(new BABYLON.Vector3(
          currentTarget.x + (lookTarget.x - currentTarget.x) * 0.06,
          camera.position.y,
          currentTarget.z + (lookTarget.z - currentTarget.z) * 0.06
        ));
      }
    } else if(autoWalk && !userControl && !panel.classList.contains('open')){
      disableCameraInput();
      autoT += dt * 0.006;
      if(autoT > 0.96) autoT = 0.02;
      const p = posOnSpine(autoT);
      const d = dirOnSpine(autoT);
      camera.position.x += (p.x - camera.position.x) * 0.03;
      camera.position.z += (p.z - camera.position.z) * 0.03;
      const lookTarget = camera.position.add(d.scale(12));
      lookTarget.y = camera.position.y;
      const currentTarget = camera.getTarget();
      camera.setTarget(new BABYLON.Vector3(
        currentTarget.x + (lookTarget.x - currentTarget.x) * 0.02,
        camera.position.y,
        currentTarget.z + (lookTarget.z - currentTarget.z) * 0.02
      ));
    } else {
      enableCameraInput();
    }
    camera.position.y = terrainHeight(camera.position.x, camera.position.z) + EYE_HEIGHT;
    const nearest = clusterAnchors.reduce((best, c) => {
      const d = BABYLON.Vector3.DistanceSquared(new BABYLON.Vector3(c.anchor.x,0,c.anchor.z), new BABYLON.Vector3(camera.position.x,0,camera.position.z));
      return !best || d < best.d ? { id:c.id, d } : best;
    }, null);
    if(nearest && nearest.id !== activeCluster){ activeCluster = nearest.id; setActiveNav(activeCluster); }
    if(terrain.material && terrain.material.setVector3){
      terrain.material.setVector3('cameraPosition', camera.position);
      terrain.material.setVector3('sunDir', sun.direction);
    }
  });

  if(clusterAnchors[0]) setActiveNav(clusterAnchors[0].id);
  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
})();
</script>
</body>
</html>
