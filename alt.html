<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>rcarmo — scenic mode</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#d8ebff;
  --ink:#10233a;
  --ink-dim:rgba(16,35,58,.68);
  --panel:rgba(255,255,255,.78);
  --panel-strong:rgba(255,255,255,.92);
  --border:rgba(27,78,130,.14);
  --blue:#2563eb;
  --blue-soft:rgba(37,99,235,.12);
  --shadow:0 18px 48px rgba(17,37,56,.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(#cfe6ff,#eef7ff);font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink)}
#cv{width:100%;height:100%;display:block}

#hud-top{
  position:fixed;inset:0 0 auto 0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.25rem;pointer-events:none;
}
#brand,
#top-actions a,
#cluster-nav,
#focus-panel,
#loading,
#hint{pointer-events:auto}
#brand{
  display:flex;align-items:center;gap:.8rem;
  padding:.7rem .95rem;border:1px solid var(--border);border-radius:18px;
  background:var(--panel);backdrop-filter:blur(14px);box-shadow:var(--shadow)
}
#brand .dot{width:.7rem;height:.7rem;border-radius:50%;background:linear-gradient(135deg,#5fb2ff,#2563eb);box-shadow:0 0 0 6px rgba(37,99,235,.08)}
#brand .title{font-weight:800;letter-spacing:-.03em;font-size:.96rem}
#brand .sub{font-size:.72rem;color:var(--ink-dim)}
#top-actions{display:flex;gap:.55rem}
#top-actions a{
  display:inline-flex;align-items:center;gap:.35rem;padding:.65rem .9rem;border-radius:16px;
  text-decoration:none;font-size:.78rem;font-weight:700;color:var(--ink);
  border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(14px);box-shadow:var(--shadow)
}
#top-actions a:hover{background:var(--panel-strong)}

#cluster-nav{
  position:fixed;left:50%;bottom:1.15rem;transform:translateX(-50%);z-index:30;
  display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center;
  max-width:min(96vw,1200px);padding:.55rem .7rem;
  border:1px solid var(--border);border-radius:22px;
  background:rgba(255,255,255,.8);backdrop-filter:blur(14px);box-shadow:var(--shadow)
}
.nav-btn{
  appearance:none;border:none;background:transparent;color:var(--ink-dim);
  font:700 .72rem/1 Inter,system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;
  padding:.55rem .82rem;border-radius:14px;cursor:pointer;transition:.18s ease all
}
.nav-btn:hover{background:var(--blue-soft);color:var(--ink)}
.nav-btn.active{background:var(--blue);color:#fff;box-shadow:0 10px 24px rgba(37,99,235,.25)}

#hint{
  position:fixed;right:1.2rem;bottom:5.4rem;z-index:30;
  padding:.5rem .75rem;border-radius:14px;border:1px solid var(--border);
  background:rgba(255,255,255,.72);backdrop-filter:blur(12px);
  font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-dim)
}

#loading{
  position:fixed;inset:50% auto auto 50%;transform:translate(-50%,-50%);z-index:50;
  padding:.85rem 1.1rem;border-radius:16px;border:1px solid var(--border);
  background:var(--panel-strong);box-shadow:var(--shadow);font-size:.9rem;font-weight:700
}
#loading.hidden{display:none}

#focus-panel{
  position:fixed;right:1.25rem;top:5.2rem;z-index:40;
  width:min(420px,calc(100vw - 2rem));
  padding:1.1rem 1.15rem 1rem;
  border:1px solid var(--border);border-radius:24px;
  background:rgba(255,255,255,.88);backdrop-filter:blur(18px);box-shadow:var(--shadow);
  transform:translateY(12px);opacity:0;pointer-events:none;transition:.22s ease all
}
#focus-panel.open{transform:translateY(0);opacity:1;pointer-events:auto}
#focus-close{
  position:absolute;top:.8rem;right:.85rem;border:none;background:transparent;cursor:pointer;
  color:var(--ink-dim);font-size:1rem;padding:.25rem .4rem;border-radius:10px
}
#focus-close:hover{background:rgba(0,0,0,.04);color:var(--ink)}
#focus-kicker{font-size:.68rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#2f6bc0;margin-bottom:.55rem}
#focus-header{display:flex;gap:.8rem;align-items:flex-start;margin-bottom:.7rem;padding-right:2.2rem}
#focus-logo{width:48px;height:48px;object-fit:contain;display:none;flex-shrink:0;border-radius:12px}
#focus-name{font-size:1.18rem;line-height:1.05;font-weight:800;letter-spacing:-.03em}
#focus-meta{font-size:.76rem;color:var(--ink-dim);margin-top:.25rem}
#focus-desc{font-size:.92rem;line-height:1.6;color:#28425e;margin-bottom:.95rem}
#focus-actions{display:flex;gap:.6rem;flex-wrap:wrap}
#focus-link,#focus-jump{
  display:inline-flex;align-items:center;justify-content:center;gap:.35rem;
  min-height:2.5rem;padding:0 .95rem;border-radius:14px;border:1px solid var(--border);
  text-decoration:none;font-size:.82rem;font-weight:800
}
#focus-link{background:var(--blue);color:#fff;border-color:transparent}
#focus-jump{background:#fff;color:var(--ink)}
#focus-link:hover{filter:brightness(1.05)}
#focus-jump:hover{background:#f5f9ff}

@media (max-width: 900px){
  #hud-top{padding:.85rem .9rem;gap:.8rem;flex-direction:column;align-items:stretch}
  #top-actions{justify-content:space-between}
  #focus-panel{left:1rem;right:1rem;top:auto;bottom:6.4rem;width:auto}
  #hint{display:none}
}
</style>
<script src="/assets/js/babylon.js"></script>
</head>
<body>
<canvas id="cv"></canvas>

<div id="loading">Loading scenic mode…</div>

<div id="hud-top">
  <div id="brand">
    <div class="dot"></div>
    <div>
      <div class="title">rcarmo.github.io</div>
      <div class="sub">scenic mode</div>
    </div>
  </div>
  <div id="top-actions">
    <a href="/">← list view</a>
    <a href="https://taoofmac.com" target="_blank" rel="noopener">taoofmac.com ↗</a>
  </div>
</div>

<nav id="cluster-nav" aria-label="Project sections"></nav>
<div id="hint">drag • wheel • click roadside signs</div>

<aside id="focus-panel" aria-live="polite">
  <button id="focus-close" type="button" aria-label="Close">✕</button>
  <div id="focus-kicker">Project</div>
  <div id="focus-header">
    <img id="focus-logo" alt="">
    <div>
      <div id="focus-name"></div>
      <div id="focus-meta"></div>
    </div>
  </div>
  <div id="focus-desc"></div>
  <div id="focus-actions">
    <a id="focus-link" href="#">Open project →</a>
    <button id="focus-jump" type="button">Jump cluster</button>
  </div>
</aside>

<script>
(async function(){
  const loading = document.getElementById('loading');
  const navEl = document.getElementById('cluster-nav');
  const panel = document.getElementById('focus-panel');
  const focusLogo = document.getElementById('focus-logo');
  const focusName = document.getElementById('focus-name');
  const focusMeta = document.getElementById('focus-meta');
  const focusDesc = document.getElementById('focus-desc');
  const focusLink = document.getElementById('focus-link');
  const focusJump = document.getElementById('focus-jump');
  const focusClose = document.getElementById('focus-close');

  const clusterPalette = {
    'ai-agents':  { color:'#2d6dff', tint:'#dce8ff', terrain:'#6b8ec9' },
    'ai-ml':      { color:'#7a4cff', tint:'#ece3ff', terrain:'#7f86b8' },
    'cloud':      { color:'#1ba1e3', tint:'#dff5ff', terrain:'#6ea6bf' },
    'hardware':   { color:'#d97706', tint:'#fff0d7', terrain:'#b8966f' },
    'infrastructure': { color:'#0f9f7a', tint:'#ddfff6', terrain:'#75a18f' },
    'libraries':  { color:'#a16207', tint:'#fff1d8', terrain:'#a79069' },
    'macos':      { color:'#db2777', tint:'#ffe1f0', terrain:'#b38496' },
    'terminal':   { color:'#1f7a50', tint:'#e0ffef', terrain:'#78a784' },
    'featured':   { color:'#2563eb', tint:'#dce8ff', terrain:'#6b8ec9' }
  };

  function escHtml(s){return String(s||'').replace(/[&<>\"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));}

  async function loadProjects(){
    const res = await fetch('/index.html', { cache: 'no-cache' });
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const sections = [...doc.querySelectorAll('.idx-section')].map((section, idx) => {
      const id = section.id ? section.id.replace(/^section-/, '') : (idx === 0 ? 'featured' : `section-${idx}`);
      const label = section.querySelector('.idx-section-title')?.textContent?.trim() || 'Projects';
      const cards = [...section.querySelectorAll('.card')].map(card => ({
        name: card.querySelector('.card-name')?.textContent?.trim() || 'project',
        desc: card.querySelector('.card-tagline')?.textContent?.trim() || '',
        url: card.getAttribute('href') || '#',
        logo: card.querySelector('img')?.getAttribute('src') || '',
        repo: card.getAttribute('data-repo') || ''
      }));
      return { id, label, projects: cards };
    }).filter(section => section.projects.length);
    return sections;
  }

  const sections = await loadProjects();
  loading.classList.add('hidden');

  const canvas = document.getElementById('cv');
  const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:false, stencil:false, antialias:true });
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.84, 0.92, 1.0, 1);
  scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
  scene.fogDensity = 0.0019;
  scene.fogColor = new BABYLON.Color3(0.83, 0.92, 1.0);

  const camera = new BABYLON.ArcRotateCamera('cam', -1.5, 1.18, 34, new BABYLON.Vector3(0, 5, 0), scene);
  camera.attachControl(canvas, true);
  camera.lowerRadiusLimit = 16;
  camera.upperRadiusLimit = 62;
  camera.lowerBetaLimit = 0.58;
  camera.upperBetaLimit = 1.35;
  camera.wheelPrecision = 26;
  camera.panningSensibility = 0;
  camera.inertia = 0.88;

  const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.28, -1, -0.15), scene);
  sun.position = new BABYLON.Vector3(80, 140, 20);
  sun.intensity = 1.9;
  const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
  hemi.intensity = 0.72;
  hemi.groundColor = new BABYLON.Color3(0.38, 0.44, 0.36);

  const shadowGen = new BABYLON.ShadowGenerator(2048, sun);
  shadowGen.usePercentageCloserFiltering = true;
  shadowGen.filteringQuality = BABYLON.ShadowGenerator.QUALITY_MEDIUM;

  const sky = BABYLON.MeshBuilder.CreateSphere('sky', { diameter: 1200, sideOrientation: BABYLON.Mesh.BACKSIDE }, scene);
  const skyMat = new BABYLON.StandardMaterial('skyMat', scene);
  skyMat.disableLighting = true;
  skyMat.emissiveColor = new BABYLON.Color3(0.84, 0.92, 1.0);
  sky.material = skyMat;

  function fract(x){ return x - Math.floor(x); }
  function hash2(x,z){ return fract(Math.sin(x*127.1 + z*311.7) * 43758.5453123); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function smoothstep(t){ return t*t*(3-2*t); }
  function valueNoise(x,z){
    const xi = Math.floor(x), zi = Math.floor(z);
    const xf = x - xi, zf = z - zi;
    const h00 = hash2(xi, zi), h10 = hash2(xi+1, zi), h01 = hash2(xi, zi+1), h11 = hash2(xi+1, zi+1);
    const u = smoothstep(xf), v = smoothstep(zf);
    return lerp(lerp(h00,h10,u), lerp(h01,h11,u), v);
  }
  function fbm(x,z){
    let t=0, a=1, f=1, sum=0;
    for(let i=0;i<5;i++){ t += valueNoise(x*f, z*f) * a; sum += a; a *= 0.5; f *= 2; }
    return t/sum;
  }

  const roadCurve = [];
  const roadLength = 780;
  const roadStep = 8;
  for(let i=0;i<=roadLength;i+=roadStep){
    const x = i - roadLength*0.5;
    const z = Math.sin(i*0.018)*18 + Math.sin(i*0.052)*4;
    roadCurve.push(new BABYLON.Vector3(x, 0, z));
  }

  function nearestRoadDist(x,z){
    let best = Infinity;
    for(let i=0;i<roadCurve.length;i++){
      const dx = x-roadCurve[i].x, dz = z-roadCurve[i].z;
      const d = dx*dx + dz*dz;
      if(d < best) best = d;
    }
    return Math.sqrt(best);
  }
  function terrainHeight(x,z){
    const macro = (fbm(x*0.008, z*0.008)-0.5) * 26;
    const micro = (fbm(x*0.028+12, z*0.028-7)-0.5) * 7;
    const ridge = Math.sin(x*0.012) * 2.8 + Math.cos(z*0.014) * 2.2;
    const d = nearestRoadDist(x,z);
    const roadFlatten = Math.exp(-(d*d)/(16*16));
    return (macro + micro + ridge) * (1 - roadFlatten*0.92) + 0.15;
  }

  const terrain = BABYLON.MeshBuilder.CreateGround('terrain', { width: 980, height: 360, subdivisions: 220 }, scene);
  const terrainPositions = terrain.getVerticesData(BABYLON.VertexBuffer.PositionKind);
  for(let i=0;i<terrainPositions.length;i+=3){
    const x = terrainPositions[i], z = terrainPositions[i+2];
    terrainPositions[i+1] = terrainHeight(x,z);
  }
  terrain.setVerticesData(BABYLON.VertexBuffer.PositionKind, terrainPositions, true);
  terrain.convertToFlatShadedMesh();
  const terrainMat = new BABYLON.StandardMaterial('terrainMat', scene);
  terrainMat.diffuseColor = new BABYLON.Color3(0.56, 0.67, 0.47);
  terrainMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
  terrain.material = terrainMat;
  terrain.receiveShadows = true;

  const roadLeft = [], roadRight = [];
  const shoulderLeft = [], shoulderRight = [];
  for(let i=0;i<roadCurve.length;i++){
    const p = roadCurve[i];
    const prev = roadCurve[Math.max(0, i-1)];
    const next = roadCurve[Math.min(roadCurve.length-1, i+1)];
    const tangent = next.subtract(prev).normalize();
    const normal = new BABYLON.Vector3(-tangent.z, 0, tangent.x);
    const roadY = terrainHeight(p.x, p.z) + 0.14;
    roadLeft.push(new BABYLON.Vector3(p.x + normal.x*5.3, roadY, p.z + normal.z*5.3));
    roadRight.push(new BABYLON.Vector3(p.x - normal.x*5.3, roadY, p.z - normal.z*5.3));
    shoulderLeft.push(new BABYLON.Vector3(p.x + normal.x*6.6, roadY-0.02, p.z + normal.z*6.6));
    shoulderRight.push(new BABYLON.Vector3(p.x - normal.x*6.6, roadY-0.02, p.z - normal.z*6.6));
  }
  const road = BABYLON.MeshBuilder.CreateRibbon('road', { pathArray:[roadLeft, roadRight], sideOrientation:BABYLON.Mesh.DOUBLESIDE, closeArray:false }, scene);
  const roadMat = new BABYLON.StandardMaterial('roadMat', scene);
  roadMat.diffuseColor = new BABYLON.Color3(0.20, 0.23, 0.27);
  roadMat.specularColor = new BABYLON.Color3(0.14, 0.14, 0.14);
  road.material = roadMat;
  road.receiveShadows = true;

  const shoulder = BABYLON.MeshBuilder.CreateRibbon('shoulder', { pathArray:[shoulderLeft, shoulderRight], sideOrientation:BABYLON.Mesh.DOUBLESIDE, closeArray:false }, scene);
  const shoulderMat = new BABYLON.StandardMaterial('shoulderMat', scene);
  shoulderMat.diffuseColor = new BABYLON.Color3(0.76, 0.72, 0.62);
  shoulderMat.specularColor = new BABYLON.Color3(0.03, 0.03, 0.03);
  shoulder.material = shoulderMat;

  function addRoadStripe(stepOffset, length, width, color){
    const ptsL=[], ptsR=[];
    for(let i=stepOffset;i<roadCurve.length;i+=length){
      const p = roadCurve[i];
      const prev = roadCurve[Math.max(0, i-1)];
      const next = roadCurve[Math.min(roadCurve.length-1, i+1)];
      const tangent = next.subtract(prev).normalize();
      const normal = new BABYLON.Vector3(-tangent.z, 0, tangent.x);
      const roadY = terrainHeight(p.x,p.z) + 0.15;
      ptsL.push(new BABYLON.Vector3(p.x + normal.x*width, roadY, p.z + normal.z*width));
      ptsR.push(new BABYLON.Vector3(p.x - normal.x*width, roadY, p.z - normal.z*width));
    }
    if(ptsL.length > 3){
      const m = BABYLON.MeshBuilder.CreateRibbon('stripe', { pathArray:[ptsL, ptsR], sideOrientation:BABYLON.Mesh.DOUBLESIDE }, scene);
      const mm = new BABYLON.StandardMaterial('stripeMat', scene);
      mm.diffuseColor = color; mm.emissiveColor = color.scale(0.12); mm.specularColor = BABYLON.Color3.Black();
      m.material = mm;
    }
  }
  addRoadStripe(4, 10, 0.12, new BABYLON.Color3(0.97,0.94,0.72));

  function makeTree(x,z,scale=1){
    const y = terrainHeight(x,z);
    const trunk = BABYLON.MeshBuilder.CreateCylinder('trunk', { height:1.4*scale, diameterTop:0.14*scale, diameterBottom:0.22*scale, tessellation:6 }, scene);
    trunk.position.set(x, y + 0.7*scale, z);
    const trunkMat = new BABYLON.StandardMaterial('trunkMat', scene);
    trunkMat.diffuseColor = new BABYLON.Color3(0.37,0.28,0.19);
    trunk.material = trunkMat;
    const crown = BABYLON.MeshBuilder.CreateSphere('crown', { diameter:1.9*scale, segments:5 }, scene);
    crown.position.set(x, y + 1.8*scale, z);
    const crownMat = new BABYLON.StandardMaterial('crownMat', scene);
    crownMat.diffuseColor = new BABYLON.Color3(0.34,0.57,0.31);
    crownMat.specularColor = BABYLON.Color3.Black();
    crown.material = crownMat;
    shadowGen.addShadowCaster(trunk); shadowGen.addShadowCaster(crown);
  }
  for(let i=0;i<220;i++){
    const x = -470 + i*4.4;
    const zA = Math.sin(i*0.28)*30 + 42 + (i%7)*2.5;
    const zB = Math.cos(i*0.19)*24 - 42 - (i%5)*2.2;
    if(nearestRoadDist(x, zA) > 18) makeTree(x, zA, 0.8 + (i%4)*0.14);
    if(nearestRoadDist(x, zB) > 18) makeTree(x, zB, 0.75 + (i%3)*0.2);
  }

  const signMeshes = [];
  const clusterAnchors = [];
  const signMaterials = [];
  function makeSignTexture(title, subtitle, color, tint){
    const dt = new BABYLON.DynamicTexture('dt_'+title, { width: 1024, height: 512 }, scene, false);
    const ctx = dt.getContext();
    ctx.fillStyle = tint; ctx.fillRect(0,0,1024,512);
    ctx.fillStyle = 'rgba(255,255,255,.96)'; ctx.fillRect(18,18,988,476);
    ctx.fillStyle = color; ctx.fillRect(18,18,988,90);
    ctx.fillStyle = '#ffffff'; ctx.font = '700 48px Inter, sans-serif'; ctx.fillText(title, 44, 76);
    ctx.fillStyle = '#23384e'; ctx.font = '700 38px Inter, sans-serif';
    const lines = subtitle.match(/.{1,42}(\s|$)/g) || [subtitle];
    lines.slice(0,3).forEach((line, idx)=>ctx.fillText(line.trim(), 44, 176 + idx*60));
    dt.update(false);
    return dt;
  }

  function addProjectSign(project, pos, color, tint){
    const post = BABYLON.MeshBuilder.CreateBox('post', { width:0.18, height:2.7, depth:0.18 }, scene);
    post.position = pos.add(new BABYLON.Vector3(0,1.35,0));
    const postMat = new BABYLON.StandardMaterial('postMat', scene);
    postMat.diffuseColor = new BABYLON.Color3(0.47,0.39,0.28); post.material = postMat;

    const board = BABYLON.MeshBuilder.CreatePlane('board', { width:4.4, height:2.2 }, scene);
    board.position = pos.add(new BABYLON.Vector3(0,3.1,0));
    board.billboardMode = BABYLON.Mesh.BILLBOARDMODE_Y;
    const dt = makeSignTexture(project.name, project.desc, color, tint);
    const mat = new BABYLON.StandardMaterial('boardMat', scene);
    mat.diffuseTexture = dt;
    mat.emissiveColor = new BABYLON.Color3(0.12,0.12,0.12);
    mat.specularColor = BABYLON.Color3.Black();
    board.material = mat;
    signMaterials.push(mat);
    shadowGen.addShadowCaster(post); shadowGen.addShadowCaster(board);
    board.metadata = project;
    signMeshes.push(board);
    return board;
  }

  sections.forEach((section, sectionIndex) => {
    const palette = clusterPalette[section.id] || { color:'#2563eb', tint:'#dce8ff', terrain:'#7aa0cf' };
    const color = palette.color;
    const tint = palette.tint;
    const roadIdx = Math.floor((sectionIndex + 1) * (roadCurve.length - 20) / (sections.length + 1));
    const center = roadCurve[roadIdx];
    const prev = roadCurve[Math.max(0, roadIdx-1)];
    const next = roadCurve[Math.min(roadCurve.length-1, roadIdx+1)];
    const tangent = next.subtract(prev).normalize();
    const normal = new BABYLON.Vector3(-tangent.z, 0, tangent.x);
    const side = sectionIndex % 2 === 0 ? 1 : -1;
    const anchor = new BABYLON.Vector3(center.x + normal.x*18*side, terrainHeight(center.x + normal.x*18*side, center.z + normal.z*18*side), center.z + normal.z*18*side);
    clusterAnchors.push({ id: section.id, label: section.label, center, anchor, color, projects: section.projects });

    const mound = BABYLON.MeshBuilder.CreateCylinder('mound', { height:1.8, diameterTop:10, diameterBottom:16, tessellation:24 }, scene);
    mound.position = anchor.add(new BABYLON.Vector3(0, 0.7, 0));
    const moundMat = new BABYLON.StandardMaterial('moundMat', scene);
    const c = BABYLON.Color3.FromHexString(color);
    moundMat.diffuseColor = BABYLON.Color3.Lerp(new BABYLON.Color3(0.57,0.69,0.49), c, 0.12);
    moundMat.specularColor = BABYLON.Color3.Black();
    mound.material = moundMat;
    mound.receiveShadows = true;

    const titleSign = addProjectSign({
      name: section.label,
      desc: `${section.projects.length} projects in this area`,
      url: section.projects[0]?.url || '/',
      logo: section.projects[0]?.logo || ''
    }, anchor.add(new BABYLON.Vector3(0,0,0)), color, tint);
    titleSign.scaling.scaleInPlace(1.14);
    titleSign.metadata = { clusterId: section.id, clusterOnly: true, label: section.label };

    section.projects.slice(0,6).forEach((project, i) => {
      const row = Math.floor(i/3), col = i%3;
      const dx = (col-1) * 6.2 + (row%2)*1.6;
      const dz = 7.5 + row*6.5;
      const px = anchor.x + normal.x*dx + tangent.x*dz*side;
      const pz = anchor.z + normal.z*dx + tangent.z*dz*side;
      const py = terrainHeight(px,pz);
      addProjectSign(project, new BABYLON.Vector3(px, py, pz), color, tint);
    });

    const navBtn = document.createElement('button');
    navBtn.className = 'nav-btn' + (sectionIndex === 0 ? ' active' : '');
    navBtn.textContent = section.label;
    navBtn.dataset.cluster = section.id;
    navBtn.addEventListener('click', () => focusCluster(section.id));
    navEl.appendChild(navBtn);
  });

  let activeCluster = clusterAnchors[0]?.id || null;
  function setActiveNav(id){
    [...navEl.querySelectorAll('.nav-btn')].forEach(btn => btn.classList.toggle('active', btn.dataset.cluster === id));
  }

  let focusMesh = null;
  function openFocus(meta){
    panel.classList.add('open');
    focusName.textContent = meta.name || meta.label || 'Project';
    focusMeta.textContent = meta.repo || meta.label || '';
    focusDesc.textContent = meta.desc || '';
    focusLink.href = meta.url || '/';
    focusJump.textContent = meta.clusterOnly ? 'Jump here' : 'Jump cluster';
    focusJump.onclick = () => focusCluster(meta.clusterId || activeCluster || clusterAnchors[0]?.id);
    if(meta.logo){ focusLogo.src = meta.logo; focusLogo.style.display = 'block'; }
    else { focusLogo.style.display = 'none'; }
  }
  function closeFocus(){ panel.classList.remove('open'); focusMesh = null; }
  focusClose.addEventListener('click', closeFocus);

  let targetAlpha = camera.alpha, targetBeta = camera.beta, targetRadius = camera.radius, targetVec = camera.target.clone();
  function focusCluster(id){
    const cluster = clusterAnchors.find(c => c.id === id);
    if(!cluster) return;
    activeCluster = id;
    setActiveNav(id);
    const ahead = roadCurve[Math.min(roadCurve.length-1, roadCurve.findIndex(p => p === cluster.center) + 8)] || cluster.center;
    const dx = ahead.x - cluster.center.x;
    const dz = ahead.z - cluster.center.z;
    targetAlpha = Math.atan2(dz, dx) - Math.PI * 0.55;
    targetBeta = 1.06;
    targetRadius = 26;
    targetVec = new BABYLON.Vector3(cluster.anchor.x, cluster.anchor.y + 4.6, cluster.anchor.z);
    openFocus({ name: cluster.label, desc: `${cluster.projects.length} project${cluster.projects.length!==1?'s':''} nearby`, url: cluster.projects[0]?.url || '/', logo: cluster.projects[0]?.logo || '', repo: cluster.id, clusterOnly: true, clusterId: cluster.id });
  }

  const pointer = scene.onPointerObservable.add((info) => {
    if(info.type !== BABYLON.PointerEventTypes.POINTERPICK) return;
    const pick = info.pickInfo;
    if(!pick || !pick.hit || !pick.pickedMesh) return;
    const meta = pick.pickedMesh.metadata;
    if(!meta) return;
    if(meta.clusterOnly){ focusCluster(meta.clusterId); return; }
    focusMesh = pick.pickedMesh;
    activeCluster = (clusterAnchors.find(c => c.projects.some(p => p.url === meta.url)) || {}).id || activeCluster;
    setActiveNav(activeCluster);
    targetVec = pick.pickedMesh.position.add(new BABYLON.Vector3(0, 1.8, 0));
    targetRadius = 18;
    targetBeta = 0.98;
    openFocus(meta);
  });

  let autoDrive = true;
  let autoT = 0.08;
  scene.onPointerDown = () => { autoDrive = false; };
  canvas.addEventListener('wheel', () => { autoDrive = false; }, { passive:true });

  scene.registerBeforeRender(() => {
    if(autoDrive && !panel.classList.contains('open')){
      autoT += engine.getDeltaTime() * 0.000012;
      if(autoT > 0.96) autoT = 0.08;
      const idx = Math.floor(autoT * (roadCurve.length-1));
      const p = roadCurve[idx];
      const next = roadCurve[Math.min(roadCurve.length-1, idx+4)];
      targetVec = new BABYLON.Vector3(p.x, terrainHeight(p.x,p.z)+4.5, p.z);
      targetAlpha = Math.atan2(next.z-p.z, next.x-p.x) - Math.PI*0.52;
      targetBeta = 1.02;
      targetRadius = 28;
      const nearest = clusterAnchors.reduce((best, c) => {
        const d = BABYLON.Vector3.DistanceSquared(c.center, p);
        return !best || d < best.d ? { id:c.id, d } : best;
      }, null);
      if(nearest && nearest.id !== activeCluster){ activeCluster = nearest.id; setActiveNav(activeCluster); }
    }
    camera.alpha = BABYLON.Scalar.Lerp(camera.alpha, targetAlpha, 0.045);
    camera.beta = BABYLON.Scalar.Lerp(camera.beta, targetBeta, 0.06);
    camera.radius = BABYLON.Scalar.Lerp(camera.radius, targetRadius, 0.055);
    camera.target = BABYLON.Vector3.Lerp(camera.target, targetVec, 0.07);
  });

  focusCluster(clusterAnchors[0]?.id);
  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
})();
</script>
</body>
</html>
